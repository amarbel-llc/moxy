# --- flake_init ---

[[tools]]
name = "flake_init"
description = "Initialize a new flake in the specified directory."
command = "bash"
arg_order = ["template", "flake_dir"]
args = ["-c", """
set -euo pipefail
template="${1:-}"
flake_dir="${2:-.}"

cd "$flake_dir"
nix_args=(flake init)
if [ -n "$template" ]; then
  nix_args+=(-t "$template")
fi

nix "${nix_args[@]}"
""", "_"]

[tools.input.properties.template]
type = "string"
description = "Template flake reference (e.g., 'templates#rust'). If not specified, uses default template."

[tools.input.properties.flake_dir]
type = "string"
description = "Directory to initialize the flake in. Defaults to current directory."

# --- flake_lock ---

[[tools]]
name = "flake_lock"
description = "Lock flake inputs without building."
command = "bash"
arg_order = ["flake_ref", "update_inputs", "override_inputs", "flake_dir", "head", "tail", "max_bytes"]
args = ["-c", """
set -euo pipefail
flake_ref="${1:-.}"
update_inputs_json="${2:-}"
override_inputs_json="${3:-}"
flake_dir="${4:-.}"
head_n="${5:-}"
tail_n="${6:-}"
max_bytes="${7:-}"

cd "$flake_dir"
nix_args=(flake lock)

if [ -n "$update_inputs_json" ] && [ "$update_inputs_json" != "null" ] && [ "$update_inputs_json" != "[]" ]; then
  while IFS= read -r inp; do
    nix_args+=(--update-input "$inp")
  done < <(printf '%s' "$update_inputs_json" | jq -r '.[]')
fi

if [ -n "$override_inputs_json" ] && [ "$override_inputs_json" != "null" ] && [ "$override_inputs_json" != "{}" ]; then
  while IFS=$'\t' read -r key val; do
    nix_args+=(--override-input "$key" "$val")
  done < <(printf '%s' "$override_inputs_json" | jq -r 'to_entries[] | [.key, (.value | tostring)] | @tsv')
fi

nix_args+=("$flake_ref")

output=$(nix "${nix_args[@]}" 2>&1) || { echo "$output"; exit 1; }

if [ -n "$tail_n" ]; then
  echo "$output" | tail -n "$tail_n"
elif [ -n "$head_n" ]; then
  echo "$output" | head -n "$head_n"
elif [ -n "$max_bytes" ]; then
  echo "$output" | head -c "$max_bytes"
else
  echo "$output"
fi
""", "_"]

[tools.input.properties.flake_ref]
type = "string"
description = "Flake reference. Defaults to '.'."

[tools.input.properties.update_inputs]
type = "array"
description = "Inputs to update."

[tools.input.properties.override_inputs]
type = "object"
description = "Map of input names to flake references to override."

[tools.input.properties.flake_dir]
type = "string"
description = "Directory containing the flake. Defaults to current directory."

[tools.input.properties.head]
type = "string"
description = "Only return the first N lines of output."

[tools.input.properties.tail]
type = "string"
description = "Only return the last N lines of output."

[tools.input.properties.max_bytes]
type = "string"
description = "Maximum bytes of output to return."

