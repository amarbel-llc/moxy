name = "freud"
description = "Past Claude Code session transcripts"

[[tools]]
name = "sessions"
description = "List all past Claude Code sessions across all projects, sorted by most recent activity. Returns columnar text with SESSION, LAST ACTIVITY, MSGS, SIZE, and PROJECT columns."
command = ".moxy/bin/freud-sessions"

[tools.input]
type = "object"

[[tools]]
name = "transcript"
description = "Return the raw JSONL transcript for a single session, looked up by session id across all projects."
command = ".moxy/bin/freud-transcript"

[tools.input]
type = "object"
required = ["session_id"]

[tools.input.properties.session_id]
type = "string"
description = "Session UUID to retrieve (36-char UUID from the sessions listing)"

[[tools]]
name = "messages"
description = """Extract conversation messages from a session with the JSONL schema already flattened. \
Returns one line per message with role, text content, tool calls (as one-line summaries), \
and tool results (as text previews). Filters by role, keyword search, and pagination."""
command = ".moxy/bin/freud-messages"
arg_order = ["session_id", "role", "search", "offset", "limit"]

[tools.input]
type = "object"
required = ["session_id"]

[tools.input.properties.session_id]
type = "string"
description = "Session UUID to retrieve (36-char UUID from the sessions listing)"

[tools.input.properties.role]
type = "string"
description = "Filter by role: 'user' or 'assistant'. Omit for both."

[tools.input.properties.search]
type = "string"
description = "Case-insensitive keyword filter on message text and tool names"

[tools.input.properties.offset]
type = "integer"
description = "Skip first N messages (0-indexed). Defaults to 0."

[tools.input.properties.limit]
type = "integer"
description = "Maximum number of messages to return. Defaults to 0 (unlimited)."

[[tools]]
name = "tool_usage"
description = """Extract tool calls from a session, already structured. Returns one line per tool \
call with sequence number, tool name, and truncated input JSON. Much faster than parsing raw \
JSONL transcripts with jq."""
command = ".moxy/bin/freud-tool-usage"
arg_order = ["session_id", "tool_name", "limit"]

[tools.input]
type = "object"
required = ["session_id"]

[tools.input.properties.session_id]
type = "string"
description = "Session UUID to retrieve (36-char UUID from the sessions listing)"

[tools.input.properties.tool_name]
type = "string"
description = "Filter by tool name substring (case-insensitive). Omit for all tools."

[tools.input.properties.limit]
type = "integer"
description = "Maximum number of tool calls to return. Defaults to 0 (unlimited)."

[[tools]]
name = "summary"
description = """High-level overview of a session: project, duration, message counts, top tools \
by frequency, and user prompts. Use this to understand what happened in a session before \
diving into messages or tool_usage."""
command = ".moxy/bin/freud-summary"

[tools.input]
type = "object"
required = ["session_id"]

[tools.input.properties.session_id]
type = "string"
description = "Session UUID to retrieve (36-char UUID from the sessions listing)"
