name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            system: x86_64-linux
            platform: linux-amd64
          - os: macos-15
            system: aarch64-darwin
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build release tarball
        # Layout is pinned by zz-tests_bats/release_tarball.bats — keep
        # the derivation and that test in sync with anything consuming
        # this artifact (homebrew-moxy/Formula/moxy.rb).
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          store_path=$(nix build .#release-tarball --no-link --print-out-paths)
          mkdir -p artifacts
          cp "${store_path}/moxy-${PLATFORM}.tar.gz" artifacts/

      - name: Build per-moxin tarballs
        run: |
          for name in $(nix eval .#standalone-moxin-tarballs --apply 'x: builtins.concatStringsSep " " (builtins.attrNames x)' --raw); do
            nix build ".#standalone-moxin-tarballs.$name"
            cp result/*.tar.gz artifacts/
          done

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp scripts/install-moxin.bash artifacts/
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
