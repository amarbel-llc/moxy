name = "get-hubbed-other"
description = "GitHub tools for repositories OTHER than the current one. Every tool requires an explicit repo parameter in OWNER/REPO format. For current-repo operations, use gh tools instead."

# ---------------------------------------------------------------------------
# Cross-repo tools. Every mutation requires an explicit -R repo.
# ---------------------------------------------------------------------------

# === Issues ================================================================

[[tools]]
name = "issue-create"
description = "Create a new issue"
command = "bash"
arg_order = ["repo", "title", "body", "labels"]
args = ["-c", """
set -euo pipefail
repo="$1"
title="$2"
body="${3:-}"
labels_json="${4:-}"
gh_args=(issue create -R "$repo" --title "$title")

[ -n "$body" ] && gh_args+=(--body "$body")
if [ -n "$labels_json" ] && [ "$labels_json" != "null" ]; then
  while IFS= read -r label; do
    gh_args+=(--label "$label")
  done < <(printf '%s' "$labels_json" | jq -r '.[]')
fi
gh "${gh_args[@]}"
""", "_"]

[tools.input]
type = "object"
required = ["repo", "title"]

[tools.input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format"

[tools.input.properties.title]
type = "string"
description = "Issue title"

[tools.input.properties.body]
type = "string"
description = "Issue body"

[tools.input.properties.labels]
type = "array"
description = "Labels to add"

[tools.input.properties.labels.items]
type = "string"

# ---

[[tools]]
name = "issue-list"
description = "List issues in a repository with optional filters"
command = "bash"
arg_order = ["repo", "state", "labels", "assignee", "milestone", "search", "limit", "output_format"]
args = ["-c", """
set -euo pipefail
repo="$1"
state="${2:-open}"
labels_json="${3:-}"
assignee="${4:-}"
milestone="${5:-}"
search="${6:-}"
limit="${7:-30}"
output_format="${8:-json}"
gh_args=(issue list -R "$repo" --state "$state" --limit "$limit" --json number,title,state,labels,assignees,milestone,createdAt,updatedAt)

if [ -n "$labels_json" ] && [ "$labels_json" != "null" ]; then
  label_csv=$(printf '%s' "$labels_json" | jq -r 'join(",")')
  gh_args+=(--label "$label_csv")
fi

[ -n "$assignee" ] && gh_args+=(--assignee "$assignee")

[ -n "$milestone" ] && gh_args+=(--milestone "$milestone")

[ -n "$search" ] && gh_args+=(--search "$search")
raw=$(gh "${gh_args[@]}")

if [ "$output_format" = "text" ]; then
  printf '%s' "$raw" | jq -r '.[] | "#\\(.number)\\t\\(.title)\\t\\([.labels[].name] | join(","))"' | column -t -s $'\\t'
else
  printf '%s' "$raw" | jq '[.[] | {
    number: .number,
    title: .title,
    state: .state,
    labels: [.labels[].name],
    assignees: [.assignees[].login],
    milestone: .milestone.title,
    created: .createdAt,
    updated: .updatedAt
  }]'
fi
""", "_"]

[tools.input]
type = "object"
required = ["repo"]

[tools.input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format"

[tools.input.properties.state]
type = "string"
description = "Filter by state: open (default), closed, or all"

[tools.input.properties.labels]
type = "array"
description = "Filter by labels"

[tools.input.properties.labels.items]
type = "string"

[tools.input.properties.assignee]
type = "string"
description = "Filter by assignee login"

[tools.input.properties.milestone]
type = "string"
description = "Filter by milestone title"

[tools.input.properties.search]
type = "string"
description = "Search query to filter issues"

[tools.input.properties.limit]
type = "integer"
description = "Maximum number of issues to return (default 30)"

[tools.input.properties.output_format]
type = "string"
description = "Output format: json (default, full details) or text (one line per issue with number, title, labels)"

# ---

[[tools]]
name = "issue-comment"
description = "Post a comment on an issue or pull request"
command = "bash"
arg_order = ["repo", "number", "body"]
args = ["-c", """
set -euo pipefail
repo="$1"
number="$2"
body="$3"
gh issue comment "$number" -R "$repo" --body "$body"
""", "_"]

[tools.input]
type = "object"
required = ["repo", "number", "body"]

[tools.input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format"

[tools.input.properties.number]
type = "integer"
description = "Issue or pull request number"

[tools.input.properties.body]
type = "string"
description = "Comment body (markdown supported)"

# ---

[[tools]]
name = "issue-close"
description = "Close an issue with optional comment"
command = "bash"
arg_order = ["repo", "number", "comment", "reason"]
args = ["-c", """
set -euo pipefail
repo="$1"
number="$2"
comment="${3:-}"
reason="${4:-}"
gh_args=(issue close "$number" -R "$repo")

[ -n "$comment" ] && gh_args+=(--comment "$comment")

[ -n "$reason" ] && gh_args+=(--reason "$reason")
gh "${gh_args[@]}"
""", "_"]

[tools.input]
type = "object"
required = ["repo", "number"]

[tools.input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format"

[tools.input.properties.number]
type = "integer"
description = "Issue number"

[tools.input.properties.comment]
type = "string"
description = "Optional comment to add before closing"

[tools.input.properties.reason]
type = "string"
description = "Close reason: completed (default) or not_planned"

# === Pull Requests =========================================================

[[tools]]
name = "pr-create"
description = "Create a new pull request"
command = "bash"
arg_order = ["repo", "title", "body", "base", "head", "draft", "labels"]
args = ["-c", """
set -euo pipefail
repo="$1"
title="$2"
body="${3:-}"
base="${4:-}"
head="${5:-}"
draft="${6:-}"
labels_json="${7:-}"
gh_args=(pr create -R "$repo" --title "$title")

[ -n "$body" ] && gh_args+=(--body "$body")

[ -n "$base" ] && gh_args+=(--base "$base")

[ -n "$head" ] && gh_args+=(--head "$head")

[ "$draft" = "true" ] && gh_args+=(--draft)
if [ -n "$labels_json" ] && [ "$labels_json" != "null" ]; then
  while IFS= read -r label; do
    gh_args+=(--label "$label")
  done < <(printf '%s' "$labels_json" | jq -r '.[]')
fi
gh "${gh_args[@]}"
""", "_"]

[tools.input]
type = "object"
required = ["repo", "title"]

[tools.input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format"

[tools.input.properties.title]
type = "string"
description = "Pull request title"

[tools.input.properties.body]
type = "string"
description = "Pull request body"

[tools.input.properties.base]
type = "string"
description = "Base branch (the branch into which you want your code merged)"

[tools.input.properties.head]
type = "string"
description = "Head branch (the branch that contains commits for your pull request). Usually necessary because gh refuses to create PRs when the working tree has untracked files unless --head is explicit. Format: OWNER:BRANCH for cross-repo PRs"

[tools.input.properties.draft]
type = "boolean"
description = "Create as draft pull request"

[tools.input.properties.labels]
type = "array"
description = "Labels to add"

[tools.input.properties.labels.items]
type = "string"
