name = "gordo"
description = "Go package documentation via go doc"

[[tools]]
name = "doc"
description = "Show documentation for a Go package or symbol. Returns the same output as 'go doc'."
command = "sh"
args = ["-c", """
set -euo pipefail
pkg="$1"
if [ -n "${2:-}" ]; then
  go doc -all "$pkg.$2"
else
  go doc -all "$pkg"
fi
""", "_"]

[tools.input]
type = "object"
required = ["package"]

[tools.input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json', 'github.com/user/repo/pkg')"

[tools.input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package overview."

[[tools]]
name = "src"
description = "Show source code for a Go symbol."
command = "sh"
args = ["-c", """
set -euo pipefail
pkg="$1"
if [ -n "${2:-}" ]; then
  go doc -all -src "$pkg.$2"
else
  go doc -all -src "$pkg"
fi
""", "_"]

[tools.input]
type = "object"
required = ["package"]

[tools.input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json')"

[tools.input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package-level source."

[[tools]]
name = "mod-read"
description = """Read a source file from the Go module cache. Resolves the module path via GOMODCACHE. \
Use `go doc` or `gordo.doc` first to find packages, then this tool to read the full source."""
command = "__LIBEXEC__/gordo-mod-read"
arg_order = ["module", "file", "start", "end"]

[tools.input]
type = "object"
required = ["module", "file"]

[tools.input.properties.module]
type = "string"
description = "Go module path with optional version (e.g. 'github.com/user/repo@v1.0.0', 'github.com/user/repo'). Without @version, uses the latest cached version."

[tools.input.properties.file]
type = "string"
description = "File path within the module (e.g. 'server/handler.go', 'pkg/types.go')"

[tools.input.properties.start]
type = "integer"
description = "Start line (1-indexed). Omit to read from beginning."

[tools.input.properties.end]
type = "integer"
description = "End line (1-indexed). Omit to read to end."
