name = "env"
description = "Environment inspection tools: check PATH binaries and environment variables."

[[tools]]
name = "which"
description = "Locate a program on PATH. Returns the absolute path if found, exits nonzero if not."
command = "which"
arg_order = ["name"]

[tools.input]
type = "object"
required = ["name"]

[tools.input.properties.name]
type = "string"
description = "Binary name to locate (e.g. 'go', 'cargo', 'pivy-tool')"

# ---

[[tools]]
name = "printenv"
description = "Print the value of an environment variable. Omit name to print all variables."
command = "printenv"
arg_order = ["name"]

[tools.input]
type = "object"

[tools.input.properties.name]
type = "string"
description = "Variable name to print (e.g. 'PATH', 'HOME', 'SSH_AUTH_SOCK')"
