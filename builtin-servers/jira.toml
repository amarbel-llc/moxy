name = "jira"
description = "Jira Cloud tools via Atlassian CLI (acli). Supports issue CRUD, transitions, linking, sprints, and search via JQL."

# === Search ================================================================

[[tools]]
name = "search"
description = "Search for issues using JQL"
command = "__LIBEXEC__/jira-search"
arg_order = ["jql", "fields", "max_results"]

[tools.input]
type = "object"
required = ["jql"]

[tools.input.properties.jql]
type = "string"
description = "JQL query string (e.g. 'project = XORCH AND status = Open')"

[tools.input.properties.fields]
type = "string"
description = "Comma-separated field names to display (default: issuetype,key,assignee,priority,status,summary)"

[tools.input.properties.max_results]
type = "integer"
description = "Maximum number of issues to return (default 50)"

# === Issues ================================================================

[[tools]]
name = "get-issue"
description = "Get a Jira issue by key"
command = "__LIBEXEC__/jira-get-issue"
arg_order = ["issue_key", "fields"]

[tools.input]
type = "object"
required = ["issue_key"]

[tools.input.properties.issue_key]
type = "string"
description = "Issue key (e.g. XORCH-703)"

[tools.input.properties.fields]
type = "string"
description = "Comma-separated field names to return (e.g. 'summary,status,assignee')"

# ---

[[tools]]
name = "create-issue"
description = "Create a new Jira issue"
command = "__LIBEXEC__/jira-create-issue"
arg_order = ["project", "summary", "description", "issuetype", "priority", "labels", "assignee", "parent"]

[tools.input]
type = "object"
required = ["project", "summary"]

[tools.input.properties.project]
type = "string"
description = "Project key (e.g. XORCH)"

[tools.input.properties.summary]
type = "string"
description = "Issue summary/title"

[tools.input.properties.description]
type = "string"
description = "Issue description (plain text or ADF)"

[tools.input.properties.issuetype]
type = "string"
description = "Issue type name (default: Task). Common: Bug, Task, Story, Sub-task"

[tools.input.properties.priority]
type = "string"
description = "Priority name (e.g. High, Medium, Low)"

[tools.input.properties.labels]
type = "string"
description = "Comma-separated labels to add"

[tools.input.properties.assignee]
type = "string"
description = "Assignee email or account ID. Use '@me' to self-assign"

[tools.input.properties.parent]
type = "string"
description = "Parent issue key for sub-tasks or epic linking"

# ---

[[tools]]
name = "update-issue"
description = "Update fields on an existing Jira issue"
command = "__LIBEXEC__/jira-update-issue"
arg_order = ["issue_key", "summary", "description", "assignee", "labels", "issuetype"]

[tools.input]
type = "object"
required = ["issue_key"]

[tools.input.properties.issue_key]
type = "string"
description = "Issue key (e.g. XORCH-703)"

[tools.input.properties.summary]
type = "string"
description = "New summary"

[tools.input.properties.description]
type = "string"
description = "New description"

[tools.input.properties.assignee]
type = "string"
description = "Assignee email or account ID"

[tools.input.properties.labels]
type = "string"
description = "Comma-separated labels to set"

[tools.input.properties.issuetype]
type = "string"
description = "New issue type"

# === Transitions ===========================================================

[[tools]]
name = "transition-issue"
description = "Transition an issue to a new status"
command = "__LIBEXEC__/jira-transition-issue"
arg_order = ["issue_key", "status"]

[tools.input]
type = "object"
required = ["issue_key", "status"]

[tools.input.properties.issue_key]
type = "string"
description = "Issue key (e.g. XORCH-703)"

[tools.input.properties.status]
type = "string"
description = "Target status name (e.g. 'In Progress', 'Done', 'To Do')"

# === Linking ===============================================================

[[tools]]
name = "create-issue-link"
description = "Create a link between two Jira issues"
command = "__LIBEXEC__/jira-create-issue-link"
arg_order = ["type", "outward_issue", "inward_issue"]

[tools.input]
type = "object"
required = ["type", "outward_issue", "inward_issue"]

[tools.input.properties.type]
type = "string"
description = "Link type (e.g. 'Blocks', 'Relates')"

[tools.input.properties.outward_issue]
type = "string"
description = "Outward issue key (e.g. XORCH-703)"

[tools.input.properties.inward_issue]
type = "string"
description = "Inward issue key (e.g. XORCH-704)"

# ---

[[tools]]
name = "link-to-epic"
description = "Link an issue to an epic by setting its parent"
command = "__LIBEXEC__/jira-link-to-epic"
arg_order = ["issue_key", "epic_key"]

[tools.input]
type = "object"
required = ["issue_key", "epic_key"]

[tools.input.properties.issue_key]
type = "string"
description = "Issue key to link (e.g. XORCH-703)"

[tools.input.properties.epic_key]
type = "string"
description = "Epic issue key (e.g. XORCH-500)"

# === Agile =================================================================

[[tools]]
name = "get-agile-boards"
description = "List Jira agile boards"
command = "__LIBEXEC__/jira-get-agile-boards"
arg_order = ["project", "name", "max_results"]

[tools.input]
type = "object"

[tools.input.properties.project]
type = "string"
description = "Filter by project key"

[tools.input.properties.name]
type = "string"
description = "Filter by board name"

[tools.input.properties.max_results]
type = "integer"
description = "Maximum results (default 50)"

# ---

[[tools]]
name = "get-sprints-from-board"
description = "List sprints for a board"
command = "__LIBEXEC__/jira-get-sprints-from-board"
arg_order = ["board_id", "state", "max_results"]

[tools.input]
type = "object"
required = ["board_id"]

[tools.input.properties.board_id]
type = "string"
description = "Board ID (get from get-agile-boards)"

[tools.input.properties.state]
type = "string"
description = "Filter by sprint state: active, closed, future (comma-separated)"

[tools.input.properties.max_results]
type = "integer"
description = "Maximum results (default 50)"
