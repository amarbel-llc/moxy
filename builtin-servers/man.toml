name = "man"
description = "Unix man page reader with section-level progressive disclosure"

[[tools]]
name = "toc"
description = "List all sections of a man page with their heading levels. Start here to discover what a page covers before reading specific sections."
command = "__LIBEXEC__/man-toc"

[tools.input]
type = "object"
required = ["page"]

[tools.input.properties.page]
type = "string"
description = "Man page name (e.g. 'ls', 'git-commit', 'mandoc')"

[[tools]]
name = "section"
description = "Read a specific section of a man page by name. Use 'toc' first to discover available section names."
command = "__LIBEXEC__/man-section"
arg_order = ["page", "section_name"]

[tools.input]
type = "object"
required = ["page", "section_name"]

[tools.input.properties.page]
type = "string"
description = "Man page name (e.g. 'ls', 'git-commit', 'mandoc')"

[tools.input.properties.section_name]
type = "string"
description = "Section name to read (e.g. 'DESCRIPTION', 'OPTIONS', 'SYNOPSIS'). Case-insensitive."

[[tools]]
name = "search"
description = "Search for man pages by keyword (apropos). Returns matching page names with short descriptions."
command = "__LIBEXEC__/man-search"

[tools.input]
type = "object"
required = ["query"]

[tools.input.properties.query]
type = "string"
description = "Keyword to search for in man page names and descriptions"

# ---

[[tools]]
name = "semantic-search"
description = "Semantic man page search using vector embeddings. More accurate than keyword search for natural language queries like 'list files' or 'configure network'. Requires a pre-built index (maneater index)."
command = "__LIBEXEC__/man-semantic-search"
arg_order = ["query", "top_k"]

[tools.input]
type = "object"
required = ["query"]

[tools.input.properties.query]
type = "string"
description = "Natural language search query (e.g. 'list files', 'configure network', 'MCP proxy')"

[tools.input.properties.top_k]
type = "integer"
description = "Number of results to return (default 10)"
