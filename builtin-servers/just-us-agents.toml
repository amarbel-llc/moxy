name = "just-us-agents"
description = "Justfile recipe runner. Lists, shows, and executes recipes from the project's justfile."

# === Discovery ================================================================

[[tools]]
auto-allow = true
name = "list-recipes"
description = "List available recipes with their descriptions, grouped by category. Shows recipe names, parameters, and doc comments."
command = "__LIBEXEC__/just-list-recipes"

[tools.input]
type = "object"

# ---

[[tools]]
auto-allow = true
name = "show-recipe"
description = "Show the full source of a recipe including its body, parameters, dependencies, and any doc comments."
command = "just"
arg_order = ["recipe"]
args = ["--show"]

[tools.input]
type = "object"
required = ["recipe"]

[tools.input.properties.recipe]
type = "string"
description = "Recipe name to show"

# === Inspection ===============================================================

[[tools]]
auto-allow = true
name = "list-variables"
description = "List all variables defined in the justfile with their values."
command = "just"
args = ["--evaluate"]

[tools.input]
type = "object"

# ---

[[tools]]
auto-allow = true
name = "dump-justfile"
description = "Output the entire justfile contents."
command = "just"
args = ["--dump"]

[tools.input]
type = "object"

# === Execution ================================================================

[[tools]]
auto-allow = true
name = "run-recipe-default"
description = "Execute the default justfile recipe (no arguments). Equivalent to running `just` with no arguments."
command = "just"

[tools.input]
type = "object"

# ---

[[tools]]
auto-allow = true
name = "run-recipe"
description = "Execute a justfile recipe with optional arguments. Use list-recipes first to discover available recipes."
command = "__LIBEXEC__/just-run-recipe"
arg_order = ["recipe", "args", "variables", "dry_run"]

[tools.input]
type = "object"
required = ["recipe"]

[tools.input.properties.recipe]
type = "string"
description = "Recipe name to execute"

[tools.input.properties.args]
type = "array"
description = "Positional arguments to pass to the recipe"

[tools.input.properties.args.items]
type = "string"

[tools.input.properties.variables]
type = "object"
description = "Variable overrides as key-value pairs (e.g. {\"foo\": \"bar\"} becomes foo=bar)"

[tools.input.properties.variables.additionalProperties]
type = "string"

[tools.input.properties.dry_run]
type = "boolean"
description = "Print what would be executed without actually running (--dry-run)"
