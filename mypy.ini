# mypy config for the first-party moxin Python (#10). Auto-discovered from the
# tree root by the gate's lint-py-types checker (conformist [linter.mypy], see
# flake.nix) and the debug-py-typecheck dev-loop recipe.
#
# Lenient v1 ("catch real type errors"): untyped third-party imports
# (atlassian, vendored marklas) and the runtime sys.path.insert imports degrade
# to Any rather than erroring, and the extensionless bin/* tool scripts are
# treated as modules. Tighten later (drop ignore_missing_imports, add
# annotations / check_untyped_defs) as the moxin Python gets typed.
[mypy]
ignore_missing_imports = True
scripts_are_modules = True
# Silence the per-line "untyped function body not checked" notes — that's the
# deliberate lenient posture, not a finding. Drop this when check_untyped_defs
# is turned on later.
disable_error_code = annotation-unchecked
