schema = 2
result-type = "text"
content-type = "application/json"
perms-request = "always-allow"
description = "List contents of a nix store path directory. Returns JSON with name, type, and optional size."
command = "@BIN@/store-ls"
arg_order = ["path", "long"]

[input]
required = ["path"]

[input.properties.path]
type = "string"
description = "Store path to list (e.g., '/nix/store/...-hello-2.12.1')."

[input.properties.long]
type = "boolean"
description = "Include file sizes for regular files. Defaults to false."

[annotations]
read-only-hint = true
idempotent-hint = true
