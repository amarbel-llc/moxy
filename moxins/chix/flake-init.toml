schema = 1
perms-request = "always-allow"
description = "Initialize a new flake in the specified directory."
command = "bash"
arg_order = ["template", "flake_dir"]
args = ["-c", """
set -euo pipefail
template="${1:-}"
flake_dir="${2:-.}"

cd "$flake_dir"
nix_args=(flake init)
if [ -n "$template" ]; then
  nix_args+=(-t "$template")
fi

nix "${nix_args[@]}"
""", "_"]

[input.properties.template]
type = "string"
description = "Template flake reference (e.g., 'templates#rust'). If not specified, uses default template."

[input.properties.flake_dir]
type = "string"
description = "Directory to initialize the flake in. Defaults to current directory."
