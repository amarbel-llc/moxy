schema = 3
result-type = "text"
content-type = "text/plain"
perms-request = "always-allow"
description = "Browse the nixpkgs attribute tree. Use to discover package paths and attribute locations."
command = "@BIN@/doc-tree"
arg-order = ["query", "strict"]

[input]
required = ["query"]

[input.properties.query]
type = "string"
description = "Attribute path query (e.g. 'python3Packages', 'haskellPackages.lens', 'manix')"

[input.properties.strict]
type = "string"
description = "Set to 'true' for strict/exact matching. Defaults to fuzzy search."

[annotations]
read-only-hint = true
idempotent-hint = true
