schema = 1
perms-request = "always-allow"
description = "Update flake.lock file. Args are passed literally to 'nix flake update' — consult your system nix's 'nix flake update --help' for supported options (syntax varies across nix versions)."
command = "@BIN@/flake-update"
arg_order = ["args", "flake_dir"]

[input.properties.args]
type = "array"
description = "Positional arguments and flags passed literally to 'nix flake update'. Each element is a single argv entry — no shell parsing. Example: ['--flake', '.', 'nixpkgs'] to update only the 'nixpkgs' input of the current flake."

[input.properties.args.items]
type = "string"

[input.properties.flake_dir]
type = "string"
description = "Directory to cd into before invoking nix. Defaults to current directory. Orthogonal to any '--flake' arg you pass."

[annotations]
open-world-hint = true
