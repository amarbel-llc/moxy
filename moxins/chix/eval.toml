schema = 2
result-type = "text"
content-type = "application/json"
description = """Evaluate a nix expression. The expr and apply parameters accept full Nix syntax \
including attribute sets, string interpolation, let bindings, lambdas, and all Nix operators."""
command = "bash"
arg_order = ["expr", "installable", "apply", "flake_dir", "max_bytes", "head", "tail"]
args = ["-c", """
set -euo pipefail
expr="${1:-}"
installable="${2:-}"
apply="${3:-}"
flake_dir="${4:-.}"
max_bytes="${5:-}"
head_n="${6:-}"
tail_n="${7:-}"

cd "$flake_dir"
nix_args=(eval --json)
if [ -n "$expr" ]; then
  nix_args+=(--expr "$expr")
elif [ -n "$installable" ]; then
  nix_args+=("$installable")
else
  nix_args+=(".#default")
fi
if [ -n "$apply" ]; then
  nix_args+=(--apply "$apply")
fi

stderr_file=$(mktemp)
trap 'rm -f "$stderr_file"' EXIT
output=$(nix "${nix_args[@]}" 2>"$stderr_file") || { cat "$stderr_file"; echo "$output"; exit 1; }

if [ -n "$tail_n" ]; then
  echo "$output" | tail -n "$tail_n"
elif [ -n "$head_n" ]; then
  echo "$output" | head -n "$head_n"
elif [ -n "$max_bytes" ]; then
  echo "$output" | head -c "$max_bytes"
else
  echo "$output"
fi
""", "_"]

[input.properties.expr]
type = "string"
description = "Nix expression to evaluate (alternative to installable). Supports full Nix syntax."

[input.properties.installable]
type = "string"
description = "Flake installable to evaluate (e.g., '.#packages.x86_64-linux')."

[input.properties.apply]
type = "string"
description = "Nix function to apply to the result (e.g., 'builtins.attrNames', 'x: builtins.length x')."

[input.properties.flake_dir]
type = "string"
description = "Directory containing the flake. Defaults to current directory."

[input.properties.max_bytes]
type = "string"
description = "Maximum bytes of output to return."

[input.properties.head]
type = "string"
description = "Only return the first N lines of output."

[input.properties.tail]
type = "string"
description = "Only return the last N lines of output."
