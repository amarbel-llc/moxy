schema = 3
perms-request = "always-allow"
description = "Create or update flake.lock without building. Args are passed literally to 'nix flake lock' — consult your system nix's 'nix flake lock --help' for supported options (syntax varies across nix versions)."
command = "@BIN@/flake-lock"
arg-order = ["args", "flake_dir"]

[input.properties.args]
type = "array"
description = "Positional arguments and flags passed literally to 'nix flake lock'. Each element is a single argv entry — no shell parsing."

[input.properties.args.items]
type = "string"

[input.properties.flake_dir]
type = "string"
description = "Directory to cd into before invoking nix. Defaults to current directory. Orthogonal to any '--flake' arg you pass."

[annotations]
idempotent-hint = true
open-world-hint = true
