schema = 1
perms-request = "always-allow"
description = "Lock flake inputs without building."
command = "@BIN@/flake-lock"
arg_order = ["flake_ref", "update_inputs", "override_inputs", "flake_dir", "head", "tail", "max_bytes"]

[input.properties.flake_ref]
type = "string"
description = "Flake reference. Defaults to '.'."

[input.properties.update_inputs]
type = "array"
description = "Inputs to update."

[input.properties.override_inputs]
type = "object"
description = "Map of input names to flake references to override."

[input.properties.flake_dir]
type = "string"
description = "Directory containing the flake. Defaults to current directory."

[input.properties.head]
type = "string"
description = "Only return the first N lines of output."

[input.properties.tail]
type = "string"
description = "Only return the last N lines of output."

[input.properties.max_bytes]
type = "string"
description = "Maximum bytes of output to return."

[annotations]
idempotent-hint = true
open-world-hint = true
