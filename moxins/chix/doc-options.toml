schema = 3
result-type = "text"
content-type = "text/plain"
perms-request = "always-allow"
description = "Search NixOS, Home-Manager, and nix-darwin options. Returns option names, types, and descriptions."
command = "@BIN@/doc-options"
arg-order = ["query", "strict"]

[input]
required = ["query"]

[input.properties.query]
type = "string"
description = "Option query (e.g. 'services.nginx', 'programs.fish', 'homebrew.casks')"

[input.properties.strict]
type = "string"
description = "Set to 'true' for strict/exact matching. Defaults to fuzzy search."

[annotations]
read-only-hint = true
idempotent-hint = true
