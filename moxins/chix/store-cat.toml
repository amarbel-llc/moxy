schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Read file contents from a nix store path. Use head/tail to limit output for large files."
command = "@BIN@/store-cat"
arg-order = ["path"]

[input]
required = ["path"]

[input.properties.path]
type = "string"
description = "Store path to read (e.g., '/nix/store/...-hello-2.12.1/bin/hello')."

[annotations]
read-only-hint = true
idempotent-hint = true

