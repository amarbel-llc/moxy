schema = 1
description = """Run commands inside a flake's devShell. Each command runs as a separate \
nix develop invocation. Execution stops on the first failure."""
command = "bash"
arg_order = ["commands", "flake_ref", "flake_dir"]
args = ["-c", """
set -euo pipefail
commands_json="$1"
flake_ref="${2:-.}"
flake_dir="${3:-.}"

cd "$flake_dir"

run_output=""
count=$(printf '%s' "$commands_json" | jq 'length')
for ((i=0; i<count; i++)); do
  cmd=$(printf '%s' "$commands_json" | jq -r ".[$i].command")
  mapfile -t cmd_args < <(printf '%s' "$commands_json" | jq -r ".[$i].args // [] | .[]")

  nix_args=(develop "$flake_ref" -c "$cmd")
  if [ ${#cmd_args[@]} -gt 0 ]; then
    nix_args+=("${cmd_args[@]}")
  fi

  stderr_file=$(mktemp)
  step_output=$(nix "${nix_args[@]}" 2>"$stderr_file") || {
    run_output+="$(cat "$stderr_file")"$'\n'"$step_output"
    rm -f "$stderr_file"
    printf '%s' "$run_output"
    exit 1
  }
  rm -f "$stderr_file"
  run_output+="$step_output"$'\n'
done

printf '%s' "$run_output"
""", "_"]

[input]
required = ["commands"]

[input.properties.commands]
type = "array"
description = """Commands to run sequentially. Each is {command: string, args?: string[]}. \
Stops on first failure."""

[input.properties.flake_ref]
type = "string"
description = "Flake reference. Defaults to '.'."

[input.properties.flake_dir]
type = "string"
description = "Directory containing the flake. Defaults to current directory."

[annotations]
open-world-hint = true

