schema = 3
result-type = "text"
content-type = "text/plain"
perms-request = "always-allow"
description = "Search Nix documentation (nixpkgs functions, NixOS options, Home-Manager options, nix-darwin options). Returns matching documentation entries."
command = "@BIN@/doc"
arg-order = ["query", "strict"]

[input]
required = ["query"]

[input.properties.query]
type = "string"
description = "Search query (e.g. 'replaceVars', 'mkDerivation', 'writeShellScriptBin')"

[input.properties.strict]
type = "string"
description = "Set to 'true' for strict/exact matching. Defaults to fuzzy search."

[annotations]
read-only-hint = true
idempotent-hint = true
