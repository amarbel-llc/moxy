schema = 1
description = "Run garbage collection on the Nix store."
command = "bash"
arg_order = ["dry_run", "max_freed"]
args = ["-c", """
set -euo pipefail
dry_run="${1:-false}"
max_freed="${2:-}"

nix_args=(store gc)
if [ "$dry_run" = "true" ]; then
  nix_args+=(--dry-run)
fi
if [ -n "$max_freed" ]; then
  nix_args+=(--max "$max_freed")
fi

nix "${nix_args[@]}"
""", "_"]

[input.properties.dry_run]
type = "string"
description = "Only print what would be deleted. Defaults to false."

[input.properties.max_freed]
type = "string"
description = "Stop after freeing this much space (e.g., '1G', '500M')."

[annotations]
destructive-hint = true
