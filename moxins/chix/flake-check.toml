schema = 1
perms-request = "always-allow"
description = "Run flake checks and tests."
command = "bash"
arg_order = ["flake_ref", "flake_dir", "keep_going"]
args = ["-c", """
set -euo pipefail
flake_ref="${1:-.}"
flake_dir="${2:-.}"
keep_going="${3:-true}"

cd "$flake_dir"
nix_args=(flake check)
if [ "$keep_going" = "true" ]; then
  nix_args+=(--keep-going)
fi
nix_args+=("$flake_ref")

stderr_file=$(mktemp)
trap 'rm -f "$stderr_file"' EXIT
output=$(nix "${nix_args[@]}" 2>"$stderr_file") || { cat "$stderr_file"; echo "$output"; exit 1; }

echo "$output"
""", "_"]

[input.properties.flake_ref]
type = "string"
description = "Flake reference. Defaults to '.'."

[input.properties.flake_dir]
type = "string"
description = "Directory containing the flake. Defaults to current directory."

[input.properties.keep_going]
type = "string"
description = "Continue on error. Defaults to true."

