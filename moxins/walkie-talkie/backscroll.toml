schema = 2
result-type = "text"
content-type = "text/plain"
perms-request = "always-allow"
description = "Show the last N lines of the walkie-talkie bus log (default 20). Unfiltered — includes traffic between other sessions and messages not addressed to this session."
command = "@BIN@/backscroll"
arg_order = ["n"]

[input]
type = "object"

[input.properties.n]
type = "string"
description = "Number of lines to show (default 20)."

[annotations]
read-only-hint = true
idempotent-hint = true
