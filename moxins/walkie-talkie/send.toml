schema = 2
result-type = "text"
content-type = "text/plain"
perms-request = "always-allow"
description = "Send a short message to another session (or 'all') on the walkie-talkie bus. The body MUST NOT contain newlines or tab characters — for long content, reference a file path, gist URL, or issue number. Sender id comes from SPINCLASS_SESSION_ID."
command = "@BIN@/send"
arg_order = ["target", "body"]

[input]
type = "object"
required = ["target", "body"]

[input.properties.target]
type = "string"
description = "Recipient session id (e.g. 'chrest/eager-poplar') or the literal 'all' for broadcast."

[input.properties.body]
type = "string"
description = "Message body. No newlines or tabs. Keep under ~4 KB for atomic append."

[annotations]
read-only-hint = false
idempotent-hint = false
