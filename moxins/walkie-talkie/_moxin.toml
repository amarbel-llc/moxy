schema = 1
name = "walkie-talkie"
description = "Cross-session message bus for coordinating peer Claude Code sessions in real time. Append-only log at $WALKIE_TALKIE_LOG (default $XDG_STATE_HOME/walkie-talkie/bus.log). Opt in per-session via /moxy:walkie-talkie — that starts a plugin monitor that pushes inbound messages as notifications. Requires SPINCLASS_SESSION_ID and Claude Code v2.1.105+."
