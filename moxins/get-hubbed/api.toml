schema = 3
result-type = "text"
content-type = "application/json"
description = """
Adhoc GitHub REST API client backed by `gh api`. Use for any endpoint
get-hubbed doesn't yet expose as a dedicated tool. Authenticated session
is inherited from `gh`'s own credentials.

`endpoint` accepts paths like `/repos/{owner}/{repo}/issues/1` or full
URLs that `gh api` understands.

Permission policy: GET/HEAD/OPTIONS auto-allow; POST/PUT/PATCH/DELETE
require user confirmation per call.
"""
command = "@BIN@/api"
arg-order = ["method", "endpoint", "body", "params", "headers", "paginate"]
perms-request = "dynamic"

[input]
type = "object"
required = ["method", "endpoint"]

[input.properties.method]
type = "string"
description = "HTTP verb (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS)."
enum = ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD", "OPTIONS"]

[input.properties.endpoint]
type = "string"
description = "REST API path, e.g. /repos/{owner}/{repo}/issues/1"

[input.properties.body]
type = "string"
description = "Optional JSON request body (ignored on read-only verbs)."

[input.properties.params]
type = "object"
description = "Query string parameters as key-value pairs"

[input.properties.params.additionalProperties]
type = "string"

[input.properties.headers]
type = "array"
description = "Additional headers in key:value format"

[input.properties.headers.items]
type = "string"

[input.properties.paginate]
type = "boolean"
description = "Auto-paginate results (read verbs only)."

[annotations]
open-world-hint = true

[dynamic-perms]
command = "@BIN@/api-perms"
arg-order = ["method"]
timeout-ms = 1000
