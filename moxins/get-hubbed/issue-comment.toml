schema = 3
result-type = "text"
substitute-result-uris = false
perms-request = "dynamic"
description = "Post a comment on an issue or pull request"
command = "@BIN@/issue-comment"
arg-order = ["issue_number", "body", "repo_owner_name"]

[input]
type = "object"
required = ["issue_number", "body"]

[input.properties.issue_number]
type = "integer"
description = "Issue or pull request number"

[input.properties.body]
type = "string"
description = "Comment body (markdown supported)"

[input.properties.repo_owner_name]
type = "string"
description = "Target repo in OWNER/NAME format (e.g. 'amarbel-llc/moxy'). Omit to default to <gh-authenticated-user>/<gh-default-name>. Auto-allowed when owner is the authenticated user or one of their orgs; prompts otherwise."

[annotations]
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo_owner_name"]
timeout-ms = 5000
