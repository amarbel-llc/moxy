schema = 3
result-type = "text"
substitute-result-uris = false
perms-request = "dynamic"
description = "Close an issue with optional comment"
command = "@BIN@/issue-close"
arg-order = ["number", "comment", "reason", "repo_owner_name"]

[input]
type = "object"
required = ["number"]

[input.properties.number]
type = "integer"
description = "Issue number"

[input.properties.comment]
type = "string"
description = "Optional comment to add before closing"

[input.properties.reason]
type = "string"
description = "Close reason: completed (default) or not planned"
enum = ["completed", "not planned", "duplicate"]

[input.properties.repo_owner_name]
type = "string"
description = "Target repo in OWNER/NAME format (e.g. 'amarbel-llc/moxy'). Omit to default to <gh-authenticated-user>/<gh-default-name>. Auto-allowed when owner is the authenticated user or one of their orgs; prompts otherwise."

[annotations]
destructive-hint = true
idempotent-hint = true
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo_owner_name"]
timeout-ms = 5000
