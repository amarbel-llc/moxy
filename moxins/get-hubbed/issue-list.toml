schema = 2
perms-request = "always-allow"
description = "List issues in the current repository with optional filters"
command = "@BIN@/issue-list"
arg_order = ["state", "labels", "assignee", "milestone", "search", "limit", "output_format"]

[input]
type = "object"

[input.properties.state]
type = "string"
description = "Filter by state: open (default), closed, or all"

[input.properties.labels]
type = "array"
description = "Filter by labels"

[input.properties.labels.items]
type = "string"

[input.properties.assignee]
type = "string"
description = "Filter by assignee login"

[input.properties.milestone]
type = "string"
description = "Filter by milestone title"

[input.properties.search]
type = "string"
description = "Search query to filter issues"

[input.properties.limit]
type = "integer"
description = "Maximum number of issues to return (default 30)"

[input.properties.output_format]
type = "string"
description = "Output format: json (default, full details) or text (one line per issue with number, state, title, labels)"

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
