schema = 3
result-type = "text"
perms-request = "dynamic"
description = "Attach an existing issue as a native sub-issue of a parent issue. Both arguments are issue numbers within the targeted repository. Sets the GitHub-native parent/child relationship (not a markdown task-list)."
command = "@BIN@/issue-sub-issue-add"
arg-order = ["parent", "sub", "replace_parent", "repo_owner_name"]

[input]
type = "object"
required = ["parent", "sub"]

[input.properties.parent]
type = "integer"
description = "Issue number of the parent issue"

[input.properties.sub]
type = "integer"
description = "Issue number of the issue to attach as a sub-issue"

[input.properties.replace_parent]
type = "boolean"
description = "If the sub-issue already has a parent, replace it. Defaults to false (the call fails if the sub-issue is already attached elsewhere)."

[input.properties.repo_owner_name]
type = "string"
description = "Target repo in OWNER/NAME format (e.g. 'amarbel-llc/moxy'). Omit to default to <gh-authenticated-user>/<gh-default-name>. Auto-allowed when owner is the authenticated user or one of their orgs; prompts otherwise."

[annotations]
idempotent-hint = false
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo_owner_name"]
timeout-ms = 5000
