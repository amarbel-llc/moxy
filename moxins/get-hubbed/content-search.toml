schema = 3
result-type = "text"
content-type = "application/json"
perms-request = "always-allow"
description = "Search for code within a repository"
command = "@BIN@/content-search"
arg-order = ["query", "path", "extension", "per_page", "page", "repo_owner_name"]

[input]
type = "object"
required = ["query"]

[input.properties.query]
type = "string"
description = "Search query (code to search for)"

[input.properties.path]
type = "string"
description = "Restrict search to a file path or directory prefix"

[input.properties.extension]
type = "string"
description = "Restrict search to a file extension (e.g. 'go', 'py')"

[input.properties.per_page]
type = "integer"
description = "Number of results per page (max 100, default 30)"

[input.properties.page]
type = "integer"
description = "Page number for pagination (default 1)"

[input.properties.repo_owner_name]
type = "string"
description = "Source repo in OWNER/NAME format (e.g. 'amarbel-llc/moxy'). Omit to default to <gh-authenticated-user>/<gh-default-name>."

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
