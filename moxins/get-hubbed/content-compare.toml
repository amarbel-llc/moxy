schema = 3
result-type = "text"
content-type = "application/json"
perms-request = "always-allow"
description = "Compare two refs (branches, tags, or commits) showing commits and file changes"
command = "@BIN@/content-compare"
arg-order = ["base", "head", "per_page", "page"]

[input]
type = "object"
required = ["base", "head"]

[input.properties.base]
type = "string"
description = "Base ref (branch, tag, or SHA)"

[input.properties.head]
type = "string"
description = "Head ref (branch, tag, or SHA)"

[input.properties.per_page]
type = "integer"
description = "Number of file entries per page (max 100, default 30)"

[input.properties.page]
type = "integer"
description = "Page number for pagination (default 1)"

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
