schema = 3
result-type = "text"
content-type = "application/json"
perms-request = "always-allow"
description = "Make an authenticated GET request to the GitHub REST API"
command = "@BIN@/api-get"
arg-order = ["endpoint", "params", "headers", "paginate"]

[input]
type = "object"
required = ["endpoint"]

[input.properties.endpoint]
type = "string"
description = "REST API path, e.g. /repos/{owner}/{repo}/actions/runs"

[input.properties.params]
type = "object"
description = "Query string parameters as key-value pairs"

[input.properties.params.additionalProperties]
type = "string"

[input.properties.headers]
type = "array"
description = "Additional headers in key:value format"

[input.properties.headers.items]
type = "string"

[input.properties.paginate]
type = "boolean"
description = "Auto-paginate results"

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
