schema = 3
substitute-result-uris = false
result-type = "text"
content-type = "application/json"
perms-request = "dynamic"
description = """Create or update a file in the repository via the GitHub Contents API. \
Automatically fetches the existing file's SHA for updates (upsert). \
Content is provided as plain text and base64-encoded by the tool."""
command = "@BIN@/content-put"
arg-order = ["path", "content", "message", "branch", "repo_owner_name"]

[input]
type = "object"
required = ["path", "content", "message"]

[input.properties.path]
type = "string"
description = "File path within the repo (e.g. 'Formula/moxy.rb', 'README.md')"

[input.properties.content]
type = "string"
description = "File content as plain text (will be base64-encoded automatically)"

[input.properties.message]
type = "string"
description = "Commit message for the file change"

[input.properties.branch]
type = "string"
description = "Target branch (default: repo's default branch)"

[input.properties.repo_owner_name]
type = "string"
description = "Target repo in OWNER/NAME format (e.g. 'amarbel-llc/moxy'). Omit to default to <gh-authenticated-user>/<gh-default-name>. Auto-allowed when owner is the authenticated user or one of their orgs; prompts otherwise."

[annotations]
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo_owner_name"]
timeout-ms = 5000
