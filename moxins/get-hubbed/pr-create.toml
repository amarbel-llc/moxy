schema = 3
result-type = "text"
substitute-result-uris = false
perms-request = "dynamic"
description = "Create a new pull request"
command = "@BIN@/pr-create"
arg-order = ["title", "body", "base", "head", "draft", "labels", "repo_owner_name"]

[input]
type = "object"
required = ["title"]

[input.properties.title]
type = "string"
description = "Pull request title"

[input.properties.body]
type = "string"
description = "Pull request body"

[input.properties.base]
type = "string"
description = "Base branch (the branch into which you want your code merged)"

[input.properties.head]
type = "string"
description = "Head branch (the branch that contains commits for your pull request). Usually necessary because gh refuses to create PRs when the working tree has untracked files unless --head is explicit. Format: OWNER:BRANCH for cross-repo PRs"

[input.properties.draft]
type = "boolean"
description = "Create as draft pull request"

[input.properties.labels]
type = "array"
description = "Labels to add"

[input.properties.labels.items]
type = "string"

[input.properties.repo_owner_name]
type = "string"
description = "Base repo in OWNER/NAME format (the PR target). Omit to default to <gh-authenticated-user>/<gh-default-name>. Auto-allowed when owner is the authenticated user or one of their orgs; prompts otherwise."

[annotations]
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo_owner_name"]
timeout-ms = 5000
