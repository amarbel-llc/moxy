schema = 3
result-type = "text"
substitute-result-uris = false
perms-request = "dynamic"
description = "Edit an existing issue's title, body, labels, or assignees. Only fields you pass are changed."
command = "@BIN@/issue-edit"
arg-order = ["number", "title", "body", "add_labels", "remove_labels", "add_assignees", "remove_assignees", "repo_owner_name"]

[input]
type = "object"
required = ["number"]

[input.properties.number]
type = "integer"
description = "Issue number"

[input.properties.title]
type = "string"
description = "New issue title. Omit to leave unchanged."

[input.properties.body]
type = "string"
description = "New issue body. Omit to leave unchanged."

[input.properties.add_labels]
type = "array"
description = "Labels to add (does not affect existing labels)"

[input.properties.add_labels.items]
type = "string"

[input.properties.remove_labels]
type = "array"
description = "Labels to remove"

[input.properties.remove_labels.items]
type = "string"

[input.properties.add_assignees]
type = "array"
description = "Assignees to add (supports @me and @copilot)"

[input.properties.add_assignees.items]
type = "string"

[input.properties.remove_assignees]
type = "array"
description = "Assignees to remove"

[input.properties.remove_assignees.items]
type = "string"

[input.properties.repo_owner_name]
type = "string"
description = "Target repo in OWNER/NAME format (e.g. 'amarbel-llc/moxy'). Omit to default to <gh-authenticated-user>/<gh-default-name>. Auto-allowed when owner is the authenticated user or one of their orgs; prompts otherwise."

[annotations]
idempotent-hint = true
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo_owner_name"]
timeout-ms = 5000
