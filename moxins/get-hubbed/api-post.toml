schema = 2
result-type = "text"
content-type = "application/json"
description = "Make an authenticated POST request to the GitHub REST API"
command = "bash"
arg_order = ["endpoint", "body", "params", "headers"]
args = ["-c", """
set -euo pipefail
endpoint="$1"
body="${2:-}"
params_json="${3:-}"
headers_json="${4:-}"
gh_args=(api "$endpoint" --method POST)

if [ -n "$body" ] && [ "$body" != "null" ] && [ "$body" != "{}" ]; then
  gh_args+=(--input -)
fi
if [ -n "$params_json" ] && [ "$params_json" != "null" ] && [ "$params_json" != "{}" ]; then
  while IFS=$'\t' read -r key val; do
    gh_args+=(-f "$key=$val")
  done < <(printf '%s' "$params_json" | jq -r 'to_entries[] | [.key, (.value | tostring)] | @tsv')
fi
if [ -n "$headers_json" ] && [ "$headers_json" != "null" ]; then
  while IFS= read -r h; do
    gh_args+=(-H "$h")
  done < <(printf '%s' "$headers_json" | jq -r '.[]')
fi

if [ -n "$body" ] && [ "$body" != "null" ] && [ "$body" != "{}" ]; then
  printf '%s' "$body" | gh "${gh_args[@]}"
else
  gh "${gh_args[@]}"
fi
""", "_"]

[input]
type = "object"
required = ["endpoint"]

[input.properties.endpoint]
type = "string"
description = "REST API path, e.g. /repos/{owner}/{repo}/issues/1"

[input.properties.body]
type = "string"
description = "JSON request body"

[input.properties.params]
type = "object"
description = "Query string parameters as key-value pairs"

[input.properties.params.additionalProperties]
type = "string"

[input.properties.headers]
type = "array"
description = "Additional headers in key:value format"

[input.properties.headers.items]
type = "string"

[annotations]
open-world-hint = true
