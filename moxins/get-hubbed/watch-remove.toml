schema = 3
result-type = "text"
content-type = "text/plain"
perms-request = "always-allow"
description = "Drop a target from the gh-watch list so it stops generating notifications. Handle format matches what watch-run returns (e.g. 'run:amarbel-llc/moxy#12345')."
command = "@BIN@/watch-remove"
arg-order = ["handle"]

[input]
type = "object"
required = ["handle"]

[input.properties.handle]
type = "string"
description = "Target handle (e.g. 'run:amarbel-llc/moxy#12345')."

[annotations]
read-only-hint = false
idempotent-hint = true
