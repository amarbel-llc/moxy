schema = 3
description = "Reopen a closed issue with optional comment"
command = "@BIN@/issue-reopen"
arg-order = ["repo", "number", "comment"]

[input]
type = "object"
required = ["repo", "number"]

[input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format, or just REPO to default owner from the current repo's org"

[input.properties.number]
type = "integer"
description = "Issue number"

[input.properties.comment]
type = "string"
description = "Optional comment to add when reopening"

[annotations]
destructive-hint = true
idempotent-hint = true
open-world-hint = true
