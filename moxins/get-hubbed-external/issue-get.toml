schema = 2
description = "Get a GitHub issue by number"
command = "@BIN@/issue-get"
arg_order = ["repo", "number", "fields", "output_format"]

[input]
type = "object"
required = ["repo", "number"]

[input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format, or just REPO to default owner from the current repo's org"

[input.properties.number]
type = "integer"
description = "Issue number"

[input.properties.fields]
type = "string"
description = "Comma-separated field names to return (e.g. 'summary,status,assignee')"

[input.properties.output_format]
type = "string"
description = "Output format: omit for text (default), or 'json' for JSON output"

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
