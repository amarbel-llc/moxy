schema = 1
description = "Post a comment on an issue or pull request"
command = "@BIN@/issue-comment"
arg_order = ["repo", "number", "body"]

[input]
type = "object"
required = ["repo", "number", "body"]

[input.properties.repo]
type = "string"
description = "Repository in OWNER/REPO format, or just REPO to default owner from the current repo's org"

[input.properties.number]
type = "integer"
description = "Issue or pull request number"

[input.properties.body]
type = "string"
description = "Comment body (markdown supported)"

[annotations]
open-world-hint = true
