schema = 1
description = "Read a Gmail message by ID. Extracts body and optionally headers. Converts HTML to plain text automatically."
command = "sh"
args = ["-c", """
set -euo pipefail
GWS=@GWS@
params=$(printf '{"userId": "me", "id": "%s", "format": "full"}' "$1")
$GWS gmail users messages get --params "$params" 2>/dev/null
""", "_"]
perms-request = "always-allow"

[input]
type = "object"
required = ["id"]

[input.properties.id]
type = "string"
description = "The Gmail message ID to read (from gmail-triage or search results)"
