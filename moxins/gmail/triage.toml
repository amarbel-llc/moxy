schema = 2
perms-request = "always-allow"
description = "Show unread inbox summary: sender, subject, date. Read-only, never modifies mailbox."
command = "@BIN@/triage"
arg_order = ["max", "query"]

[annotations]
read-only-hint = true
open-world-hint = true

[input]
type = "object"

[input.properties.max]
type = "string"
description = "Maximum messages to show (default: 20)"

[input.properties.query]
type = "string"
description = "Gmail search query (default: is:unread). Example: 'from:boss', 'subject:invoice'"
