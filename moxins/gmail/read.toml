schema = 2
perms-request = "always-allow"
description = "Read a Gmail message by ID. Extracts body and optionally headers. Converts HTML to plain text automatically."
command = "@BIN@/read"
arg_order = ["id"]

[annotations]
read-only-hint = true
open-world-hint = true

[input]
type = "object"
required = ["id"]

[input.properties.id]
type = "string"
description = "The Gmail message ID to read (from triage or search results)"
