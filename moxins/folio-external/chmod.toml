schema = 1
perms-request = "each-use"
description = """Change file mode bits on a single path. Mode is octal (\"755\") or symbolic (\"+x\", \"u+x,go-w\"). \
No recursion — pair with folio-external.glob if you need to act on many paths."""
command = "@BIN@/chmod"
arg_order = ["path", "mode"]

[input]
type = "object"
required = ["path", "mode"]

[input.properties.path]
type = "string"
description = "Absolute path to a file or directory."

[input.properties.mode]
type = "string"
description = "Octal mode (e.g. \"755\", \"0644\") or symbolic mode (e.g. \"+x\", \"u+x,go-w\")."

[annotations]
destructive-hint = true
idempotent-hint = true
