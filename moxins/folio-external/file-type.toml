schema = 3
result-type = "text"
description = """Identify file type using magic bytes. Returns a human-readable \
description (e.g. 'ELF 64-bit executable', 'Bash script, ASCII text')."""
command = "@BIN@/file-type"
arg-order = ["path"]

[input]
required = ["path"]

[input.properties.path]
type = "string"
description = "Absolute path to the file to identify."

[annotations]
read-only-hint = true
idempotent-hint = true
