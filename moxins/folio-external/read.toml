schema = 1
description = """Read an entire file with line numbers. Output format: `     N\\tcontent` per line. \
Large files (>2000 lines) return a head+tail summary instead — use read_range for specific sections. \
Accepts moxy.native:// result URIs as file paths, replacing `head` and `tail` piping on command output."""
command = "@BIN@/read"

[input]
type = "object"
required = ["file_path"]

[input.properties.file_path]
type = "string"
description = "Absolute path to the file to read"

[annotations]
read-only-hint = true
idempotent-hint = true
