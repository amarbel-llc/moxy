schema = 2
description = "Create a new Jira issue"
command = "__LIBEXEC__/jira-create-issue"
arg_order = ["project", "summary", "description", "issuetype", "priority", "labels", "assignee", "parent", "output_format"]

[input]
type = "object"
required = ["project", "summary"]

[input.properties.project]
type = "string"
description = "Project key (e.g. XORCH)"

[input.properties.summary]
type = "string"
description = "Issue summary/title"

[input.properties.description]
type = "string"
description = "Issue description (plain text or ADF)"

[input.properties.issuetype]
type = "string"
description = "Issue type name (default: Task). Common: Bug, Task, Story, Sub-task"

[input.properties.priority]
type = "string"
description = "Priority name (e.g. High, Medium, Low)"

[input.properties.labels]
type = "string"
description = "Comma-separated labels to add"

[input.properties.assignee]
type = "string"
description = "Assignee email or account ID. Use '@me' to self-assign"

[input.properties.parent]
type = "string"
description = "Parent issue key for sub-tasks or epic linking"

[input.properties.output_format]
type = "string"
description = "Output format: omit for text (default), or 'json' for JSON output"
