schema = 3
result-type = "text"
perms-request = "dynamic"
description = """List contents of a tarball (.tar.gz, .tar.bz2, .tar, etc). \
Optionally filter entries by a grep pattern."""
command = "@BIN@/tar-list"
arg-order = ["path", "pattern"]

[input]
required = ["path"]

[input.properties.path]
type = "string"
description = "Path to the tarball. Auto-allowed inside CWD, /nix/store, and Claude-native dirs; prompts elsewhere."

[input.properties.pattern]
type = "string"
description = "Optional grep pattern to filter entries (e.g. 'bin/' or '\\.toml$')."

[annotations]
read-only-hint = true
idempotent-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["read"]
arg-order = ["path"]
timeout-ms = 1000
