schema = 3
result-type = "text"
perms-request = "dynamic"
description = """Copy a file or directory. Source is read-policy-gated; destination is write-policy-gated. \
Use recursive to copy directories."""
command = "@BIN@/cp"
arg-order = ["source", "destination", "recursive"]

[input]
type = "object"
required = ["source", "destination"]

[input.properties.source]
type = "string"
description = "Source path. Auto-allowed inside CWD, /nix/store, and Claude-native dirs; prompts elsewhere."

[input.properties.destination]
type = "string"
description = "Destination path. Auto-allowed inside CWD and Claude write-allow dirs ($CLAUDE_CODE_TMPDIR, /tmp/claude-*, ~/.claude/plans/, ~/.claude/projects/); refuses /nix/store; prompts elsewhere."

[input.properties.recursive]
type = "boolean"
description = "Copy directories recursively. Default false."

[annotations]
destructive-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["copy"]
arg-order = ["source", "destination"]
timeout-ms = 1000
