schema = 3
result-type = "text"
perms-request = "dynamic"
description = """Create a directory and any missing parent directories. No error if the \
directory already exists."""
command = "@BIN@/mkdir"
arg-order = ["path"]

[input]
type = "object"
required = ["path"]

[input.properties.path]
type = "string"
description = "Directory path to create. Auto-allowed inside CWD and Claude write-allow dirs; refuses /nix/store; prompts elsewhere."

[annotations]
idempotent-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["write"]
arg-order = ["path"]
timeout-ms = 1000
