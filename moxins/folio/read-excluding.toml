schema = 3
result-type = "text"
perms-request = "always-allow"
description = """Read a file with an inclusive line range omitted, equivalent to `sed 'delete_start,delete_end d' <file>`. \
Output format: `     N\\tcontent` per line. Accepts moxy.native:// result URIs as file paths, replacing `sed` \
deletion piping on command output."""
command = "@BIN@/read-excluding"
arg-order = ["file_path", "delete_start", "delete_end"]

[input]
type = "object"
required = ["file_path", "delete_start", "delete_end"]

[input.properties.file_path]
type = "string"
description = "Path to the file to read (must be within CWD or be a moxy.native:// result URI)"

[input.properties.delete_start]
type = "integer"
description = "Inclusive first line to omit (1-indexed)"

[input.properties.delete_end]
type = "integer"
description = "Inclusive last line to omit (1-indexed)"

[annotations]
read-only-hint = true
idempotent-hint = true
