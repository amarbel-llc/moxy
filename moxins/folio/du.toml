schema = 3
perms-request = "dynamic"
description = """Disk usage of a file or directory. Defaults to summary mode (one row per argument) and \
does not cross filesystem boundaries. Returns JSON {path, bytes, human}; pass flags for raw du output."""
command = "@BIN@/du"
arg-order = ["path", "flags"]

[input]
type = "object"
required = ["path"]

[input.properties.path]
type = "string"
description = "File or directory path. Auto-allowed inside CWD, /nix/store, and Claude-native dirs; prompts elsewhere."

[input.properties.flags]
type = "string"
description = "Optional flags passed to du (e.g. \"-ah\", \"-c\"). When provided, runs du directly instead of JSON output."

[annotations]
read-only-hint = true
idempotent-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["read"]
arg-order = ["path"]
timeout-ms = 1000
