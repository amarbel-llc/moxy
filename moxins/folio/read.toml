schema = 3
result-type = "text"
no-truncate = true
perms-request = "dynamic"
description = """Read an entire file with line numbers. Output format: `     N\\tcontent` per line. \
Accepts moxy.native:// result URIs as file paths, replacing `head` and `tail` piping on command output."""
command = "@BIN@/read"
arg-order = ["file_path"]

[input]
type = "object"
required = ["file_path"]

[input.properties.file_path]
type = "string"
description = "Path to the file to read. Auto-allowed inside CWD, /nix/store, and Claude-native dirs (~/.claude, /tmp/claude-*); prompts elsewhere. Also accepts moxy.native:// result URIs."

[annotations]
read-only-hint = true
idempotent-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["read"]
arg-order = ["file_path"]
timeout-ms = 1000
