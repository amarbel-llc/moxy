schema = 1
perms-request = "always-allow"
description = """Read an entire file with line numbers. Output format: `     N\\tcontent` per line. \
Accepts moxy.native:// result URIs as file paths, replacing `head` and `tail` piping on command output."""
command = "@BIN@/read"
arg_order = ["file_path"]

[input]
type = "object"
required = ["file_path"]

[input.properties.file_path]
type = "string"
description = "Path to the file to read (must be within CWD or be a moxy.native:// result URI)"

[annotations]
read-only-hint = true
idempotent-hint = true
