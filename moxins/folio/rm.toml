schema = 3
result-type = "text"
perms-request = "dynamic"
description = """Remove files or directories. Each path is independently write-policy-gated. \
Use force to ignore nonexistent paths, recursive to remove directories."""
command = "@BIN@/rm"
arg-order = ["paths", "force", "recursive"]

[input]
type = "object"
required = ["paths"]

[input.properties.paths]
type = "string"
description = "Space-separated file or directory paths to remove. Each is auto-allowed inside CWD or Claude write-allow dirs; refuses /nix/store; prompts elsewhere."

[input.properties.force]
type = "boolean"
description = "Ignore nonexistent files (no error). Default false."

[input.properties.recursive]
type = "boolean"
description = "Remove directories and their contents recursively. Default false."

[annotations]
destructive-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["write"]
arg-order = ["paths"]
timeout-ms = 1000
