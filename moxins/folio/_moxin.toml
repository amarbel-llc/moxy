description = "File I/O tools. Reads auto-allow inside CWD, /nix/store, and the entire ~/.claude tree (plus /tmp/claude-*, $CLAUDE_CODE_TMPDIR, ~/.local/log/moxy). Writes auto-allow inside CWD, $CLAUDE_CODE_TMPDIR, /tmp/claude-*, ~/.claude/plans, and ~/.claude/projects. /nix/store writes are denied. Anywhere else prompts."
