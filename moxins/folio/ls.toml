schema = 2
result-type = "text"
content-type = "application/json"
perms-request = "always-allow"
description = """List directory contents with type and size metadata. Returns JSON array of entries \
sorted alphabetically. Each entry has name, type (file/directory/symlink), and size (bytes, files only). \
Pass flags to customize output (e.g. \"-la\" for long format with hidden files)."""
command = "bash"
arg_order = ["path", "flags"]
args = ["-c", """
set -euo pipefail
assert_within_cwd() {
  case "$1" in /dev/fd/*) return ;; esac
  local resolved cwd
  resolved=$(realpath -m "$1")
  cwd=$(realpath -m "$PWD")
  case "$resolved" in
    "$cwd"|"$cwd"/*) ;;
    *) echo "path '$1' is outside CWD ($cwd). Use folio-external instead." >&2; exit 1 ;;
  esac
}
dir="${1:-.}"
flags="${2:-}"
assert_within_cwd "$dir"

if [ ! -d "$dir" ]; then
  echo "not a directory: $dir" >&2
  exit 1
fi

if [ -n "$flags" ]; then
  ls $flags -- "$dir"
  exit 0
fi

first=true
echo "["
for entry in "$dir"/*; do
  [ -e "$entry" ] || [ -L "$entry" ] || continue
  name=$(basename "$entry")

  if [ -L "$entry" ]; then
    type="symlink"
  elif [ -d "$entry" ]; then
    type="directory"
  else
    type="file"
  fi

  $first || echo ","
  first=false

  if [ "$type" = "file" ]; then
    size=$(stat -c '%s' "$entry")
    printf '  {"name": %s, "type": "%s", "size": %s}' "$(printf '%s' "$name" | jq -Rs .)" "$type" "$size"
  else
    printf '  {"name": %s, "type": "%s"}' "$(printf '%s' "$name" | jq -Rs .)" "$type"
  fi
done
echo ""
echo "]"
""", "_"]

[input]
type = "object"

[input.properties.path]
type = "string"
description = "Directory path to list. Defaults to current working directory. Must be within CWD."

[input.properties.flags]
type = "string"
description = "Optional flags passed to ls (e.g. \"-la\", \"-lh\"). When provided, runs ls directly instead of JSON output."
