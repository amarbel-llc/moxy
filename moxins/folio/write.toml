schema = 3
result-type = "text"
perms-request = "dynamic"
permit-async = false
# folio.write only ever WRITES; it never reads a cached-result blob. The
# madder://blobs/<digest> -> /dev/fd/N argv rewrite is a read-side mechanism,
# so leaving it on corrupts any file whose literal content contains such a
# URI (the content arg is written verbatim, never read from the fd). Opt out
# so content and file_path reach the script unmodified (#366).
substitute-result-uris = false
description = """Create or overwrite a file. Uses atomic write (tempfile + rename) to prevent \
partial writes. Creates parent directories if needed. Preserves permissions of existing files."""
command = "@BIN@/write"
arg-order = ["file_path", "content"]

[input]
type = "object"
required = ["file_path", "content"]

[input.properties.file_path]
type = "string"
description = "Path to the file to write. Auto-allowed inside CWD, $CLAUDE_CODE_TMPDIR, /tmp/claude-*, ~/.claude/plans/, and ~/.claude/projects/<proj>/memory/; refuses /nix/store; prompts elsewhere."

[input.properties.content]
type = "string"
description = "The content to write to the file"

[annotations]
destructive-hint = true
idempotent-hint = true

[dynamic-perms]
command = "@BIN@/folio-perms"
args = ["write"]
arg-order = ["file_path"]
timeout-ms = 5000
