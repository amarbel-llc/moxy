schema = 2
perms-request = "always-allow"
description = "Search Google Drive files by query. Returns file metadata: name, ID, MIME type, modified time, web link. Use Drive query syntax for the q parameter."
command = "@BIN@/search"
arg_order = ["query", "page_size"]

[annotations]
read-only-hint = true
open-world-hint = true

[input]
type = "object"
required = ["query"]

[input.properties.query]
type = "string"
description = """Drive search query. Examples:
- name contains 'report'
- mimeType = 'application/vnd.google-apps.document'
- mimeType = 'application/vnd.google-apps.spreadsheet'
- modifiedTime > '2024-01-01'
- 'me' in owners
Combine with 'and': name contains 'Q1' and mimeType = 'application/vnd.google-apps.spreadsheet'"""

[input.properties.page_size]
type = "string"
description = "Max results to return (default: 20, max: 1000)"
