schema = 1
description = "List files in a Google Drive folder. Returns file metadata for all items in the folder."
command = "sh"
args = ["-c", """
set -euo pipefail
page_size="${2:-50}"
sq="'"
params=$(printf '{"q": "%s%s%s in parents and trashed = false", "pageSize": %s, "fields": "files(id,name,mimeType,modifiedTime,size,webViewLink)", "orderBy": "name"}' "$sq" "$1" "$sq" "$page_size")
@GWS@ drive files list --params "$params" 2>/dev/null
""", "_"]
perms-request = "always-allow"

[input]
type = "object"
required = ["folder_id"]

[input.properties.folder_id]
type = "string"
description = "The Drive folder ID. Use 'root' for the top-level My Drive folder."

[input.properties.page_size]
type = "string"
description = "Max results to return (default: 50, max: 1000)"
