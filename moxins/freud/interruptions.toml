schema = 2
perms-request = "always-allow"
description = """Aggregate agent-pause events (permission prompts, rejections, interruptions) across sessions. \
Returns a ranked table showing which tools cause the most pauses, with approval rates. \
Useful for identifying tools that should be auto-allowed (high approval rate = low friction)."""
command = "@BIN@/interruptions"
arg_order = ["project", "days", "limit"]

[input]
type = "object"

[input.properties.project]
type = "string"
description = "Filter sessions by project path substring (case-insensitive match on resolved cwd or directory name). Omit for all projects."

[input.properties.days]
type = "integer"
description = "Analyze sessions from the last N days. Defaults to 7."

[input.properties.limit]
type = "integer"
description = "Maximum number of entries in the table. Defaults to 20, 0 for unlimited."

[annotations]
read-only-hint = true
idempotent-hint = true
