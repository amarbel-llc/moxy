schema = 1
perms-request = "always-allow"
description = "List all past Claude Code sessions across all projects, sorted by most recent activity. Returns columnar text with SESSION, LAST ACTIVITY, MSGS, SIZE, and PROJECT columns."
command = "__LIBEXEC__/freud-sessions"

[input]
type = "object"

[input.properties.project]
type = "string"
description = "Filter sessions by project path substring (case-insensitive match on resolved cwd or directory name). Omit for all projects."
