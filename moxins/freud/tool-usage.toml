schema = 2
perms-request = "always-allow"
description = """Extract tool calls from a session, already structured. Returns one line per tool \
call with sequence number, tool name, and truncated input JSON. Much faster than parsing raw \
JSONL transcripts with jq."""
command = "@BIN@/tool-usage"
arg_order = ["session_id", "tool_name", "limit", "include_results", "project", "days"]

[input]
type = "object"

[input.properties.session_id]
type = "string"
description = "Session UUID to retrieve (36-char UUID from the sessions listing), or a subagent id of the form 'agent-XXX' (from the subagents listing) to drill into a specific subagent's tool calls. Omit to scan across all recent sessions (use project/days to filter)."

[input.properties.tool_name]
type = "string"
description = "Filter by tool name substring (case-insensitive). Omit for all tools."

[input.properties.limit]
type = "integer"
description = "Maximum number of tool calls to return. Defaults to 0 (unlimited)."

[input.properties.include_results]
type = "boolean"
description = "Include truncated result/error text alongside each tool call. Defaults to false."

[input.properties.project]
type = "string"
description = "Filter sessions by project path substring (case-insensitive). Only used when session_id is omitted."

[input.properties.days]
type = "integer"
description = "Analyze sessions from the last N days. Defaults to 7. Only used when session_id is omitted."

[annotations]
read-only-hint = true
idempotent-hint = true
