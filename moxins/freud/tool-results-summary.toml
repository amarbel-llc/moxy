schema = 2
perms-request = "always-allow"
description = """Summarize tool results across sessions: total calls, successes, errors, empty results, \
and rejections per tool. Shows error rates and example error previews. Useful for understanding tool \
reliability and identifying flaky tools or misconfigured servers."""
command = "@BIN@/tool-results-summary"
arg_order = ["project", "days", "tool_name", "limit"]

[input]
type = "object"

[input.properties.project]
type = "string"
description = "Filter sessions by project path substring (case-insensitive). Omit for all projects."

[input.properties.days]
type = "integer"
description = "Analyze sessions from the last N days. Defaults to 7."

[input.properties.tool_name]
type = "string"
description = "Filter to a specific tool name (case-insensitive substring). Omit for all tools."

[input.properties.limit]
type = "integer"
description = "Maximum number of entries to return. Defaults to 30, 0 for unlimited."

[annotations]
read-only-hint = true
idempotent-hint = true
