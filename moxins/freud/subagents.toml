schema = 2
perms-request = "always-allow"
description = """List subagents spawned during a session. Returns agent ID, prompt snippet, tool count, \
and message count. Use the agent ID with messages or tool-usage tools to drill into subagent details."""
command = "@BIN@/subagents"
arg_order = ["session_id"]

[input]
type = "object"
required = ["session_id"]

[input.properties.session_id]
type = "string"
description = "Session UUID to retrieve (36-char UUID from the sessions listing)"

[annotations]
read-only-hint = true
idempotent-hint = true
