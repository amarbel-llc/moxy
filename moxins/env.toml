name = "env"
description = "Environment inspection tools: check PATH binaries and environment variables."

[[tools]]
name = "which"
description = "Locate a program on PATH. Returns the absolute path if found, exits nonzero if not."
command = "which"
arg_order = ["name"]

[tools.input]
type = "object"
required = ["name"]

[tools.input.properties.name]
type = "string"
description = "Binary name to locate (e.g. 'go', 'cargo', 'pivy-tool')"

# ---

[[tools]]
name = "print"
description = "Print the value of a single environment variable by name."
command = "printenv"
arg_order = ["name"]

[tools.input]
type = "object"
required = ["name"]

[tools.input.properties.name]
type = "string"
description = "Variable name to print (e.g. 'PATH', 'HOME', 'SSH_AUTH_SOCK')"

# ---

[[tools]]
name = "list"
description = "List all environment variables and their values."
command = "printenv"

# ---

[[tools]]
name = "readlink"
description = "Resolve a symbolic link, printing its target. With canonicalize=true, follow every symlink recursively (-f)."
command = "bash"
arg_order = ["path", "canonicalize"]
args = ["-c", """
set -euo pipefail
path="$1"
canonicalize="${2:-}"
if [ "$canonicalize" = "true" ]; then
  readlink -f "$path"
else
  readlink "$path"
fi
""", "_"]

[tools.input]
type = "object"
required = ["path"]

[tools.input.properties.path]
type = "string"
description = "Path to resolve (e.g. '/usr/bin/python3', './result')"

[tools.input.properties.canonicalize]
type = "boolean"
description = "Follow every symlink recursively (-f). Default: false (show immediate target only)"

# ---

[[tools]]
name = "realpath"
description = "Resolve a path to its absolute canonical form, resolving all symlinks and relative components."
command = "realpath"
arg_order = ["path"]

[tools.input]
type = "object"
required = ["path"]

[tools.input.properties.path]
type = "string"
description = "Path to canonicalize (e.g. '../foo/bar', './result', '~/.config')"
