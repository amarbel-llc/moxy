schema = 2
perms-request = "always-allow"
description = "Show upcoming calendar events across all calendars. Returns event titles, times, and attendees."
command = "@BIN@/agenda"
arg_order = ["days", "calendar", "timezone"]

[annotations]
read-only-hint = true
open-world-hint = true

[input]
type = "object"

[input.properties.days]
type = "string"
description = "Number of days ahead to show. Use '0' for today only."

[input.properties.calendar]
type = "string"
description = "Filter to specific calendar name or ID"

[input.properties.timezone]
type = "string"
description = "IANA timezone override (e.g. America/New_York). Defaults to Google account timezone."
