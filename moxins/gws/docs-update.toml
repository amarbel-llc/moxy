schema = 1
description = "Update an existing Google Doc with new markdown content. Replaces the document body entirely."
command = "sh"
args = ["-c", """
set -euo pipefail
GWS=/nix/store/dqm6k8bb9aksarw4g6fyy3p76k7z96hd-gws-0.22.5/bin/gws
tmp=".gws-upload-$$"
trap 'rm -f "$tmp"' EXIT
printf '%s' "$2" > "$tmp"
$GWS drive files update --params "$(printf '{"fileId": "%s"}' "$1")" --upload "$tmp" --upload-content-type text/markdown 2>/dev/null
""", "_"]
perms-request = "always-allow"

[input]
type = "object"
required = ["file_id", "content"]

[input.properties.file_id]
type = "string"
description = "The Drive file ID of the Google Doc to update"

[input.properties.content]
type = "string"
description = "Markdown content to replace the document body with"
