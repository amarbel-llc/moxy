schema = 1
description = "Get the content of a Google Doc by document ID. Returns the document structure including title, body text, headers, and formatting."
command = "sh"
args = ["-c", """
set -euo pipefail
params=$(printf '{"documentId": "%s"}' "$1")
/nix/store/dqm6k8bb9aksarw4g6fyy3p76k7z96hd-gws-0.22.5/bin/gws docs documents get --params "$params" 2>/dev/null
""", "_"]
perms-request = "always-allow"

[input]
type = "object"
required = ["document_id"]

[input.properties.document_id]
type = "string"
description = "The Google Docs document ID (from Drive search results or a shared link URL)"
