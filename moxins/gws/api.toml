schema = 2
perms-request = "always-allow"
description = "Raw gws API call for debugging. Pass the full gws command arguments (e.g. 'calendar events list') and optional --params JSON."
command = "@BIN@/api"
arg_order = ["command", "params"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["command"]

[input.properties.command]
type = "string"
description = "gws command arguments (e.g. 'calendar calendarList list', 'gmail users messages list', 'drive files list')"

[input.properties.params]
type = "string"
description = "JSON params string (e.g. '{\"userId\": \"me\", \"maxResults\": 5}')"
