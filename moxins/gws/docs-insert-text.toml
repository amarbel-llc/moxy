schema = 1
description = "Insert text at a specific index in a Google Doc. Use docs-get first to find the correct index. Does not affect anchored comments."
command = "sh"
args = ["-c", """
set -euo pipefail
GWS=/nix/store/dqm6k8bb9aksarw4g6fyy3p76k7z96hd-gws-0.22.5/bin/gws
params=$(printf '{"documentId": "%s"}' "$1")
json=$(printf '{"requests": [{"insertText": {"location": {"index": %s}, "text": "%s"}}], "writeControl": {"requiredRevisionId": "%s"}}' "$2" "$3" "$4")
$GWS docs documents batchUpdate --params "$params" --json "$json" 2>/dev/null
""", "_"]
perms-request = "always-allow"

[input]
type = "object"
required = ["document_id", "index", "text", "revision_id"]

[input.properties.document_id]
type = "string"
description = "The Google Docs document ID"

[input.properties.index]
type = "string"
description = "Zero-based character index to insert at. Use docs-get to find indices."

[input.properties.text]
type = "string"
description = "Text to insert"

[input.properties.revision_id]
type = "string"
description = "The revisionId from docs-get for optimistic locking"
