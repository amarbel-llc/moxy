schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Execute the default justfile recipe (no arguments). Equivalent to running `just` with no arguments."
command = "bash"
args = ["-c", """
set -euo pipefail
if [ -f flake.nix ]; then
  nix develop -c just
else
  just
fi
""", "_"]

[input]
type = "object"

[annotations]
open-world-hint = true
