schema = 3
perms-request = "always-allow"
description = "Execute a justfile recipe with optional arguments. Use list-recipes first to discover available recipes."
command = "@BIN@/run-recipe"
arg-order = ["recipe", "args", "variables", "dry_run"]

[input]
type = "object"
required = ["recipe"]

[input.properties.recipe]
type = "string"
description = "Recipe name to execute. Supports dir/recipe syntax for child justfiles in subdirectories."

[input.properties.args]
type = "array"
description = "Positional arguments to pass to the recipe"

[input.properties.args.items]
type = "string"

[input.properties.variables]
type = "object"
description = "Variable overrides as key-value pairs (e.g. {\"foo\": \"bar\"} becomes foo=bar)"

[input.properties.variables.additionalProperties]
type = "string"

[input.properties.dry_run]
type = "boolean"
description = "Print what would be executed without actually running (--dry-run)"

[annotations]
open-world-hint = true
