schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Show the full source of a recipe including its body, parameters, dependencies, and any doc comments."
command = "just"
arg-order = ["recipe"]
args = ["--show"]

[input]
type = "object"
required = ["recipe"]

[input.properties.recipe]
type = "string"
description = "Recipe name to show. Supports dir/recipe syntax for child justfiles in subdirectories."

[annotations]
read-only-hint = true
idempotent-hint = true
