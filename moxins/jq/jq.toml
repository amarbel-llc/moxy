schema = 1
perms-request = "always-allow"
description = "Execute a jq filter. Only jq is invoked — no shell evaluation. Cached result URIs (moxy.native://results/{session}/{id}) in args are rewritten to /dev/fd/N for streaming."
command = "sh"
arg_order = ["filter", "flags", "files", "cwd"]
stdin_param = "stdin"
args = ["-c", """
set -euo pipefail
filter="$1"
flags_json="${2:-}"
files_json="${3:-}"
cwd_val="${4:-}"

[ -n "$cwd_val" ] && cd "$cwd_val"

jq_flags=()
if [ -n "$flags_json" ] && [ "$flags_json" != "null" ]; then
  while IFS= read -r f; do
    jq_flags+=("$f")
  done < <(printf '%s' "$flags_json" | jq -r '.[]')
fi

jq_files=()
if [ -n "$files_json" ] && [ "$files_json" != "null" ]; then
  while IFS= read -r f; do
    jq_files+=("$f")
  done < <(printf '%s' "$files_json" | jq -r '.[]')
fi

if [ ${#jq_files[@]} -gt 0 ]; then
  jq "${jq_flags[@]}" "$filter" "${jq_files[@]}"
else
  jq "${jq_flags[@]}" "$filter"
fi
""", "_"]

[input]
type = "object"
required = ["filter"]

[input.properties.filter]
type = "string"
description = "jq filter expression (e.g. '.data[] | select(.name == \"foo\")')."

[input.properties.flags]
type = "array"
description = "jq flags (e.g. [\"-r\", \"-c\", \"--slurp\"])."

[input.properties.flags.items]
type = "string"

[input.properties.files]
type = "array"
description = "Input file paths, passed after the filter. Result URIs are rewritten to /dev/fd/N."

[input.properties.files.items]
type = "string"

[input.properties.stdin]
type = "string"
description = "Content written to jq's stdin. Either literal JSON text, or a moxy.native://results/{session}/{id} URI to feed cached output."

[input.properties.cwd]
type = "string"
description = "Working directory"
