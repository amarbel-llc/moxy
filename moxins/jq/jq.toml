schema = 3
perms-request = "always-allow"
description = "Execute a jq filter. Only jq is invoked — no shell evaluation. madder://blobs/<digest> URIs in args are rewritten to /dev/fd/N (streaming via `madder cat`)."
command = "@BIN@/jq"
arg-order = ["filter", "flags", "files", "cwd"]
stdin-param = "stdin"

[input]
type = "object"
required = ["filter"]

[input.properties.filter]
type = "string"
description = "jq filter expression (e.g. '.data[] | select(.name == \"foo\")')."

[input.properties.flags]
type = "array"
description = "jq flags (e.g. [\"-r\", \"-c\", \"--slurp\"])."

[input.properties.flags.items]
type = "string"

[input.properties.files]
type = "array"
description = "Input file paths, passed after the filter. madder://blobs/<digest> URIs are rewritten to /dev/fd/N."

[input.properties.files.items]
type = "string"

[input.properties.stdin]
type = "string"
description = "Content written to jq's stdin. Either literal JSON text, or a madder://blobs/<digest> URI to feed a cached blob."

[input.properties.cwd]
type = "string"
description = "Working directory"

[annotations]
read-only-hint = true
idempotent-hint = true
