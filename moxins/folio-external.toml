name = "folio-external"
description = "File I/O tools for paths outside the current working directory. Same tools as folio but without CWD restriction."

[[tools]]
name = "read"
description = "Read an entire file with line numbers. Output format: `     N\\tcontent` per line. Large files (>2000 lines) return a head+tail summary instead — use read_range for specific sections."
command = "sh"
args = ["-c", """
set -euo pipefail
file="$1"
total=$(wc -l < "$file")
if [ "$total" -gt 2000 ]; then
  echo "File $file has $total lines (showing head and tail)."
  echo "Use read_range for specific sections."
  echo ""
  echo "--- Head ---"
  awk 'NR<=50{printf "%6d\\t%s\\n", NR, $0}' "$file"
  echo ""
  echo "--- Tail ---"
  awk -v t="$total" 'NR>(t-20){printf "%6d\\t%s\\n", NR, $0}' "$file"
else
  awk '{printf "%6d\\t%s\\n", NR, $0}' "$file"
fi
""", "_"]

[tools.input]
type = "object"
required = ["file_path"]

[tools.input.properties.file_path]
type = "string"
description = "Absolute path to the file to read"

[[tools]]
name = "read_range"
description = "Read an inclusive line range from a file, equivalent to `sed -n 'start,end p' <file>`. Output format: `     N\\tcontent` per line."
command = "sh"
args = ["-c", """
set -euo pipefail
file="$1"; start="$2"; end="$3"
awk -v s="$start" -v e="$end" 'NR>=s && NR<=e{printf "%6d\\t%s\\n", NR, $0} NR>e{exit}' "$file"
""", "_"]

[tools.input]
type = "object"
required = ["file_path", "start", "end"]

[tools.input.properties.file_path]
type = "string"
description = "Absolute path to the file to read"

[tools.input.properties.start]
type = "integer"
description = "Inclusive start line (1-indexed)"

[tools.input.properties.end]
type = "integer"
description = "Inclusive end line (1-indexed)"

[[tools]]
name = "read_excluding"
description = "Read a file with an inclusive line range omitted, equivalent to `sed 'delete_start,delete_end d' <file>`. Output format: `     N\\tcontent` per line."
command = "sh"
args = ["-c", """
set -euo pipefail
file="$1"; ds="$2"; de="$3"
awk -v ds="$ds" -v de="$de" '!(NR>=ds && NR<=de){printf "%6d\\t%s\\n", NR, $0}' "$file"
""", "_"]

[tools.input]
type = "object"
required = ["file_path", "delete_start", "delete_end"]

[tools.input.properties.file_path]
type = "string"
description = "Absolute path to the file to read"

[tools.input.properties.delete_start]
type = "integer"
description = "Inclusive first line to omit (1-indexed)"

[tools.input.properties.delete_end]
type = "integer"
description = "Inclusive last line to omit (1-indexed)"

[[tools]]
name = "glob"
description = """Fast file pattern matching tool that works with any codebase size. \
Supports glob patterns like "**/*.js" or "src/**/*.ts". \
Returns matching file paths sorted by modification time (newest first)."""
command = "bash"
arg_order = ["pattern", "path"]
args = ["-c", """
set -euo pipefail
pattern="$1"
dir="${2:-.}"

cd "$dir"
shopt -s globstar nullglob dotglob

files=()
for f in $pattern; do

  [ -f "$f" ] && files+=("$f")
done

if [ ${#files[@]} -eq 0 ]; then
  echo "No files found"
  exit 0
fi

# Sort by modification time (newest first)
for f in "${files[@]}"; do
  printf '%s\t%s\n' "$(stat -c '%Y' "$f")" "$f"
done | sort -rn | cut -f2-
""", "_"]

[tools.input]
type = "object"
required = ["pattern"]

[tools.input.properties.pattern]
type = "string"
description = "The glob pattern to match files against (e.g. \"**/*.go\", \"src/**/*.ts\")"

[tools.input.properties.path]
type = "string"
description = "The directory to search in. Defaults to current working directory."

[[tools]]
name = "ls"
description = """List directory contents with type and size metadata. Returns JSON array of entries \
sorted alphabetically. Each entry has name, type (file/directory/symlink), and size (bytes, files only)."""
command = "bash"
arg_order = ["path"]
args = ["-c", """
set -euo pipefail
dir="${1:-.}"

if [ ! -d "$dir" ]; then
  echo "not a directory: $dir" >&2
  exit 1
fi

first=true
echo "["
for entry in "$dir"/*; do
  [ -e "$entry" ] || [ -L "$entry" ] || continue
  name=$(basename "$entry")

  if [ -L "$entry" ]; then
    type="symlink"
  elif [ -d "$entry" ]; then
    type="directory"
  else
    type="file"
  fi

  $first || echo ","
  first=false

  if [ "$type" = "file" ]; then
    size=$(stat -c '%s' "$entry")
    printf '  {"name": %s, "type": "%s", "size": %s}' "$(printf '%s' "$name" | jq -Rs .)" "$type" "$size"
  else
    printf '  {"name": %s, "type": "%s"}' "$(printf '%s' "$name" | jq -Rs .)" "$type"
  fi
done
echo ""
echo "]"
""", "_"]

[tools.input]
type = "object"

[tools.input.properties.path]
type = "string"
description = "Directory path to list. Defaults to current working directory."

# ---

[[tools]]
name = "write"
description = """Create or overwrite a file. Uses atomic write (tempfile + rename) to prevent \
partial writes. Creates parent directories if needed. Preserves permissions of existing files."""
command = "sh"
arg_order = ["file_path", "content"]
args = ["-c", """
set -euo pipefail
file="$1"
content="$2"

# Create parent directories
mkdir -p "$(dirname "$file")"

# Atomic write via tempfile + rename
tmp=$(mktemp "$(dirname "$file")/.folio-write-XXXXXX")
trap 'rm -f "$tmp"' EXIT

printf '%s' "$content" > "$tmp"

# Preserve permissions of existing file
if [ -f "$file" ]; then
  chmod --reference="$file" "$tmp" 2>/dev/null || true
else
  chmod 644 "$tmp"
fi

mv "$tmp" "$file"
trap - EXIT
echo "Wrote $(printf '%s' "$content" | wc -c) bytes to $file"
""", "_"]

[tools.input]
type = "object"
required = ["file_path", "content"]

[tools.input.properties.file_path]
type = "string"
description = "Absolute path to the file to write"

[tools.input.properties.content]
type = "string"
description = "The content to write to the file"
