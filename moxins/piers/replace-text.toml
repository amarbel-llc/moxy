schema = 2
perms-request = "always-allow"
description = "Find and replace text in a Google Doc. Case-sensitive by default. Preserves anchored comments unless the entire anchor text is consumed by the match."
command = "@BIN@/replace-text"
arg_order = ["document_id", "find", "replace", "revision_id", "match_case"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["document_id", "find", "replace", "revision_id"]

[input.properties.document_id]
type = "string"
description = "The Google Docs document ID"

[input.properties.find]
type = "string"
description = "Text to find in the document"

[input.properties.replace]
type = "string"
description = "Replacement text"

[input.properties.match_case]
type = "string"
description = "Case-sensitive matching (default: true)"

[input.properties.revision_id]
type = "string"
description = "The revisionId from get for optimistic locking"
