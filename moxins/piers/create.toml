schema = 3
perms-request = "always-allow"
description = "Create a new Google Doc from markdown content. Returns the created file metadata including ID and web link."
command = "@BIN@/create"
arg-order = ["title", "content"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["title", "content"]

[input.properties.title]
type = "string"
description = "Title for the new Google Doc"

[input.properties.content]
type = "string"
description = "Markdown content for the document"
