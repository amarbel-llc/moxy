schema = 3
perms-request = "always-allow"
description = "Update tab properties (title, position, icon) in a Google Doc."
command = "@BIN@/tab-update"
arg-order = ["document_id", "tab_properties", "fields"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["document_id", "tab_properties", "fields"]

[input.properties.document_id]
type = "string"
description = "The Google Docs document ID"

[input.properties.tab_properties]
type = "string"
description = """JSON object with tab properties to update. Must include tabId. Examples:
- Rename: {"tabId": "t.abc", "title": "New Name"}
- Move: {"tabId": "t.abc", "index": 0}
- Icon: {"tabId": "t.abc", "iconEmoji": "\U0001F4DD"}"""

[input.properties.fields]
type = "string"
description = "Comma-separated field mask of properties being set (e.g. 'title', 'index', 'title,iconEmoji'). Only listed fields are updated."
