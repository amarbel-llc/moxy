schema = 3
substitute-result-uris = false
perms-request = "always-allow"
description = "Insert text at a specific index in a Google Doc. Use get first to find the correct index. Does not affect anchored comments."
command = "@BIN@/insert-text"
arg-order = ["document_id", "index", "text", "revision_id", "tab_id"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["document_id", "index", "text", "revision_id"]

[input.properties.document_id]
type = "string"
description = "The Google Docs document ID"

[input.properties.index]
type = "string"
description = "Zero-based character index to insert at. Use get to find indices."

[input.properties.text]
type = "string"
description = "Text to insert"

[input.properties.revision_id]
type = "string"
description = "The revisionId from get for optimistic locking"

[input.properties.tab_id]
type = "string"
description = "Tab ID to insert into. When omitted, targets the first tab."
