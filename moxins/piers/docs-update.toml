schema = 2
perms-request = "always-allow"
description = "Update an existing Google Doc with new markdown content. Replaces the document body entirely."
command = "@BIN@/docs-update"
arg_order = ["file_id", "content"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["file_id", "content"]

[input.properties.file_id]
type = "string"
description = "The Drive file ID of the Google Doc to update"

[input.properties.content]
type = "string"
description = "Markdown content to replace the document body with"
