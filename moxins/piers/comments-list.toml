schema = 2
perms-request = "always-allow"
description = "List comments on a Google Doc. Returns comment text, author, quoted content, and resolved status."
command = "@BIN@/comments-list"
arg_order = ["file_id", "page_size"]

[annotations]
read-only-hint = true
open-world-hint = true

[input]
type = "object"
required = ["file_id"]

[input.properties.file_id]
type = "string"
description = "The Drive file ID of the Google Doc"

[input.properties.page_size]
type = "string"
description = "Max comments to return (default: 100)"
