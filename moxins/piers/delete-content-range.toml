schema = 3
perms-request = "always-allow"
description = "Delete a range of content from a Google Doc by start/end index. Use get first to find indices. Cannot delete the last newline of the body or cross structural boundaries (tables, section breaks)."
command = "@BIN@/delete-content-range"
arg-order = ["document_id", "start_index", "end_index", "revision_id"]

[annotations]
open-world-hint = true

[input]
type = "object"
required = ["document_id", "start_index", "end_index", "revision_id"]

[input.properties.document_id]
type = "string"
description = "The Google Docs document ID"

[input.properties.start_index]
type = "string"
description = "Zero-based start index (inclusive)"

[input.properties.end_index]
type = "string"
description = "Zero-based end index (exclusive)"

[input.properties.revision_id]
type = "string"
description = "The revisionId from get for optimistic locking"
