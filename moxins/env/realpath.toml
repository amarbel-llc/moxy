schema = 3
perms-request = "always-allow"
description = "Resolve a path to its absolute canonical form, resolving all symlinks and relative components."
command = "@BIN@/realpath"
arg-order = ["path"]

[input]
type = "object"
required = ["path"]

[input.properties.path]
type = "string"
description = "Path to canonicalize (e.g. '../foo/bar', './result', '~/.config')"

[annotations]
read-only-hint = true
idempotent-hint = true
