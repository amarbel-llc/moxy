schema = 3
perms-request = "always-allow"
description = "Print the value of a single environment variable by name."
command = "@BIN@/print"
arg-order = ["name"]

[input]
type = "object"
required = ["name"]

[input.properties.name]
type = "string"
description = "Variable name to print (e.g. 'PATH', 'HOME', 'SSH_AUTH_SOCK')"

[annotations]
read-only-hint = true
idempotent-hint = true
