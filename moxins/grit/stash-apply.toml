schema = 1
perms-request = "always-allow"
description = "Apply a stash to the working tree without removing it from the stash list"
command = "bash"
arg_order = ["stash_ref", "repo_path"]
args = ["-c", """
set -euo pipefail
stash_ref="${1:-stash@{0}}"
repo="${2:-.}"
cd "$repo"
git stash apply "$stash_ref"
""", "_"]

[input]
type = "object"

[input.properties.stash_ref]
type = "string"
description = "Stash reference (e.g. stash@{0}). Defaults to stash@{0}"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
idempotent-hint = true
