schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Verify the GPG signature of a tag"
command = "@BIN@/tag-verify"
arg-order = ["name", "repo_path"]

[input]
type = "object"
required = ["name"]

[input.properties.name]
type = "string"
description = "Tag name to verify"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
read-only-hint = true
idempotent-hint = true
