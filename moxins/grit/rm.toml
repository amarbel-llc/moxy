schema = 3
result-type = "text"
perms-request = "always-allow"
permit-async = false
description = "Delete files and stage the deletion (git rm)"
command = "@BIN@/rm"
arg-order = ["paths", "force", "recursive", "repo_path"]

[input]
type = "object"
required = ["paths"]

[input.properties.paths]
type = "array"
description = "Array of file path strings to remove, e.g. [\"old_file.go\", \"removed.txt\"] (relative to repo root)"

[input.properties.paths.items]
type = "string"

[input.properties.force]
type = "boolean"
description = "Force removal of files even if they have local modifications (git rm -f)"

[input.properties.recursive]
type = "boolean"
description = "Allow recursive removal of directories and their contents (git rm -r)"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
destructive-hint = true
idempotent-hint = true
