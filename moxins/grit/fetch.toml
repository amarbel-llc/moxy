schema = 3
perms-request = "always-allow"
description = "Fetch from a remote repository"
command = "@BIN@/fetch"
arg-order = ["remote", "prune", "all", "tags", "repo_path"]

[input]
type = "object"

[input.properties.all]
type = "boolean"
description = "Fetch from all remotes"

[input.properties.prune]
type = "boolean"
description = "Prune remote-tracking branches no longer on remote"

[input.properties.remote]
type = "string"
description = "Remote name (default origin)"

[input.properties.tags]
type = "boolean"
description = "Fetch all tags from the remote into local refs/tags/ (--tags). Does not imply --prune-tags."

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
idempotent-hint = true
open-world-hint = true
