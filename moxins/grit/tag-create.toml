schema = 3
description = """Create a tag. Defaults to a signed annotated tag (matches `git tag -s`). \
Set `lightweight = true` for a non-annotated tag (mutually exclusive with `sign` and `message`). \
Does not push — use grit_tag-push or grit_push afterward."""
command = "@BIN@/tag-create"
arg-order = ["name", "message", "ref", "sign", "lightweight", "force", "repo_path"]

[input]
type = "object"
required = ["name"]

[input.properties.name]
type = "string"
description = "Tag name (e.g. \"v0.4.4\")"

[input.properties.message]
type = "string"
description = "Tag message. Required for annotated/signed tags; ignored when lightweight = true."

[input.properties.ref]
type = "string"
description = "Commit/branch/tag to point at (default HEAD)"

[input.properties.sign]
type = "boolean"
description = "Sign the tag with the configured signing key (default true). Implies an annotated tag."

[input.properties.lightweight]
type = "boolean"
description = "Create a lightweight tag (no message, no signature). Mutually exclusive with sign and message."

[input.properties.force]
type = "boolean"
description = "Replace an existing tag with the same name (-f)"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
destructive-hint = false
idempotent-hint = false
