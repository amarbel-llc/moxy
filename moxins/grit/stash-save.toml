schema = 3
result-type = "text"
perms-request = "always-allow"
permit-async = false
description = "Save uncommitted changes to a stash"
command = "@BIN@/stash-save"
arg-order = ["message", "include_untracked", "repo_path", "paths"]

[input]
type = "object"

[input.properties.message]
type = "string"
description = "Stash message"

[input.properties.include_untracked]
type = "boolean"
description = "Include untracked files (-u)"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[input.properties.paths]
type = "array"
description = "Limit the stash to these pathspecs (git stash push -- <paths>), e.g. [\"flake.lock\"]. Omit to stash the whole working tree."

[input.properties.paths.items]
type = "string"

[annotations]
idempotent-hint = false
