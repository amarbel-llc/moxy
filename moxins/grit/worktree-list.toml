schema = 3
perms-request = "always-allow"
description = "List all git worktrees with path, HEAD, branch, and lock/prune state"
command = "@BIN@/worktree-list"
arg-order = ["repo_path"]

[input]
type = "object"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
read-only-hint = true
idempotent-hint = true
