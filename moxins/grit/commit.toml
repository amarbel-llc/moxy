schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Create a new commit with staged changes"
command = "@BIN@/commit"
arg-order = ["message", "amend", "fixup", "squash", "allow_empty", "repo_path"]

[input]
type = "object"

[input.properties.message]
type = "string"
description = "Commit message. Required for ordinary commits; ignored when fixup or squash is set (git autogenerates the message)."

[input.properties.amend]
type = "boolean"
description = "Amend the previous commit instead of creating a new one"

[input.properties.fixup]
type = "string"
description = "Create a fixup! commit targeting <commit> (--fixup=<commit>). The message is autogenerated; the commit will be auto-squashed by a later `rebase --autosquash` or `restack`. Mutually exclusive with squash."

[input.properties.squash]
type = "string"
description = "Create a squash! commit targeting <commit> (--squash=<commit>). Like fixup but lets you provide a new message at squash time. Mutually exclusive with fixup."

[input.properties.allow_empty]
type = "boolean"
description = "Allow a commit that records no changes (--allow-empty). Useful for marking points in history without modifying any files."

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"
