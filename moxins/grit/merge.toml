schema = 1
perms-request = "always-allow"
description = "Merge a branch into the current branch"
command = "@BIN@/merge"
arg_order = ["branch", "no_ff", "squash", "abort", "continue", "repo_path"]

[input]
type = "object"

[input.properties.branch]
type = "string"
description = "Branch to merge"

[input.properties.no_ff]
type = "boolean"
description = "Create a merge commit even if fast-forward is possible (--no-ff)"

[input.properties.squash]
type = "boolean"
description = "Squash commits before merging (--squash)"

[input.properties.abort]
type = "boolean"
description = "Abort an in-progress merge"

[input.properties."continue"]
type = "boolean"
description = "Continue merge after resolving conflicts"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"
