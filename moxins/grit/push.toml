schema = 3
result-type = "text"
description = "Push commits to a remote repository"
command = "@BIN@/push"
arg-order = ["remote", "branch", "set_upstream", "force_with_lease", "force_if_includes", "repo_path", "remote_branch"]

[input]
type = "object"

[input.properties.branch]
type = "string"
description = "Branch to push"

[input.properties.force_with_lease]
type = "boolean"
description = "Force-push with lease (--force-with-lease). Refuses the push if the remote has moved beyond the local ref's last-known position. Safer than --force; use this for stacked-PR workflows."

[input.properties.force_if_includes]
type = "boolean"
description = "Require that the pushed commit includes whatever is at the remote tip (--force-if-includes). Must be used together with force_with_lease; git docs recommend pairing the two for the safest forced push."

[input.properties.remote]
type = "string"
description = "Remote name (default origin)"

[input.properties.remote_branch]
type = "string"
description = "Destination branch on the remote. When set, pushes a refspec <branch>:<remote_branch> (source defaults to HEAD if branch is empty), e.g. `git push origin local-branch:remote-branch` or `git push origin HEAD:some-other-branch`."

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[input.properties.set_upstream]
type = "boolean"
description = "Set upstream tracking reference (-u)"

[annotations]
open-world-hint = true
