schema = 3
result-type = "text"
description = "Push commits to a remote repository"
command = "@BIN@/push"
arg-order = ["remote", "branch", "set_upstream", "force", "repo_path"]

[input]
type = "object"

[input.properties.branch]
type = "string"
description = "Branch to push"

[input.properties.force]
type = "boolean"
description = "Force push"

[input.properties.remote]
type = "string"
description = "Remote name (default origin)"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[input.properties.set_upstream]
type = "boolean"
description = "Set upstream tracking reference (-u)"

[annotations]
open-world-hint = true
