schema = 3
result-type = "text"
description = "Push commits to a remote repository"
command = "@BIN@/push"
arg-order = ["remote", "branch", "set_upstream", "force_with_lease", "force_if_includes", "repo_path", "remote_branch", "lease_ref_sha"]

[input]
type = "object"

[input.properties.branch]
type = "string"
description = "Branch to push"

[input.properties.force_with_lease]
type = "boolean"
description = "Force-push with lease (--force-with-lease). Refuses the push if the remote has moved beyond the local ref's last-known position. Safer than --force; use this for stacked-PR workflows."

[input.properties.force_if_includes]
type = "boolean"
description = "Require that the pushed commit includes whatever is at the remote tip (--force-if-includes). Must be used together with force_with_lease; git docs recommend pairing the two for the safest forced push. NOTE: this is a no-op when lease_ref_sha is also set — git only runs the includes reflog-reachability check for the implicit lease (bare --force-with-lease), not the explicit --force-with-lease=<ref>:<sha> form, so on the explicit-SHA path the expected-SHA lease is the only active check."

[input.properties.lease_ref_sha]
type = "string"
description = "Expected current remote SHA for the branch being force-pushed. When set together with force_with_lease, uses the explicit-value form (--force-with-lease=<branch>:<lease_ref_sha>) instead of the bare boolean flag. Required when the local repo has no remote-tracking ref for the branch (e.g. a narrow fetch refspec, or a branch checked out without one) — the boolean form fails with 'stale info' in that case since git has no local baseline to compare against. Fetch the true remote SHA out-of-band (e.g. via the GitHub API) before passing it here."

[input.properties.remote]
type = "string"
description = "Remote name (default origin)"

[input.properties.remote_branch]
type = "string"
description = "Destination branch on the remote. When set, pushes a refspec <branch>:<remote_branch> (source defaults to HEAD if branch is empty), e.g. `git push origin local-branch:remote-branch` or `git push origin HEAD:some-other-branch`."

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[input.properties.set_upstream]
type = "boolean"
description = "Set upstream tracking reference (-u)"

[annotations]
open-world-hint = true
