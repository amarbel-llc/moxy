schema = 1
description = "Remove a git worktree by path"
command = "@BIN@/worktree-remove"
arg_order = ["path", "force", "repo_path"]

[input]
type = "object"
required = ["path"]

[input.properties.path]
type = "string"
description = "Path of the worktree to remove"

[input.properties.force]
type = "boolean"
description = "Force removal even if worktree has uncommitted changes (--force)"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
destructive-hint = true
