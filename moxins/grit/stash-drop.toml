schema = 1
description = "Delete a stash entry"
command = "@BIN@/stash-drop"
arg_order = ["stash_ref", "repo_path"]

[input]
type = "object"
required = ["stash_ref"]

[input.properties.stash_ref]
type = "string"
description = "Stash reference to drop (e.g. stash@{0})"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[annotations]
destructive-hint = true
