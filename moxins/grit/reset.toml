schema = 1
perms-request = "always-allow"
description = "Unstage files (soft reset only, does not modify working tree)"
command = "@BIN@/reset"
arg_order = ["paths", "soft", "ref", "repo_path"]

[input]
type = "object"

[input.properties.paths]
type = "array"
description = "File paths to unstage (relative to repo root)"

[input.properties.paths.items]
type = "string"

[input.properties.soft]
type = "boolean"
description = "Soft reset: move HEAD back without changing index or working tree (use with ref)"

[input.properties.ref]
type = "string"
description = "Target ref for soft reset (e.g. HEAD~1, HEAD~3, a branch). Defaults to HEAD~1"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"
