schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Restack a stacked-PR branch chain. Runs `git rebase -i --autosquash --update-refs --onto <onto> <root>^` non-interactively, where <root> is the inclusive bottom of your stack (the script translates to <root>^ internally so <root>'s own commit gets replayed). If the rebase fails (conflicts), resume via grit.rebase --continue or --abort."
command = "@BIN@/restack"
arg-order = ["onto", "root", "repo_path"]

[input]
type = "object"

[input.properties.onto]
type = "string"
description = "New base ref to graft the stack onto (branch, tag, or commit)."

[input.properties.root]
type = "string"
description = "Inclusive lower bound of the rebase — typically the bottom branch of your stack. Its tip is itself replayed and its ref repositioned via --update-refs. Internally translated to <root>^ before being passed to git rebase."

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"
