schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Stage files for commit"
command = "@BIN@/add"
arg-order = ["paths", "repo_path", "intent_to_add"]

[input]
type = "object"
required = ["paths"]

[input.properties.paths]
type = "array"
description = "Array of file path strings to stage, e.g. [\"src/main.go\", \"README.md\"] (relative to repo root)"

[input.properties.paths.items]
type = "string"

[input.properties.repo_path]
type = "string"
description = "Path to the git repository (defaults to current working directory — almost never needed)"

[input.properties.intent_to_add]
type = "boolean"
description = "Record only the intent to add paths (git add -N). Files appear in diffs as new but their content is not staged."

[annotations]
idempotent-hint = true
