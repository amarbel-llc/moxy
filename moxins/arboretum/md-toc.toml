schema = 3
result-type = "text"
perms-request = "always-allow"
description = "List headings from a markdown document with level indicators and auto-generated IDs (suitable for `arboretum.md-section` / `arboretum.md-anchor` selectors). Uses pandoc's gfm reader so headings adjacent to inline `<a name=...>` HTML anchors are recovered correctly. Use to discover structure before reading specific sections."
command = "@BIN@/md-toc"
stdin-param = "markdown"

[input]
type = "object"
required = ["markdown"]

[input.properties.markdown]
type = "string"
description = "Markdown content to parse. Pass literal text or a moxy.native://results/{session}/{id} URI."

[annotations]
read-only-hint = true
idempotent-hint = true
