schema = 3
result-type = "text"
content-type = "text/x-go"
perms-request = "always-allow"
description = "Show source code for a Go symbol. Note: backed by `go doc -src`, which does not honor build tags (upstream bug golang/go#76829), so symbols in files behind `//go:build <tag>` are not shown — read those files via hamster.mod-read."
command = "@BIN@/src"
arg-order = ["package", "symbol"]

[input]
type = "object"
required = ["package"]

[input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json')"

[input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package-level source."

[annotations]
read-only-hint = true
idempotent-hint = true
