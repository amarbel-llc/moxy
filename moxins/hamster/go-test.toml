schema = 3
result-type = "text"
perms-request = "always-allow"
description = """Run Go tests. Equivalent to 'go test' with optional package \
filter, test name pattern, verbose output, and run count."""
command = "@BIN@/go-test"
arg-order = ["packages", "run", "verbose", "count", "race", "cover", "coverprofile", "timeout", "short", "failfast", "shuffle", "tags", "cwd"]

[input]

[input.properties.packages]
type = "string"
description = "Package pattern(s) to test (default './...'). Multiple patterns separated by whitespace are forwarded as separate argv entries to `go test`. Examples: './internal/config/...', './cmd/moxy', './internal/india/... ./internal/charlie/...'."

[input.properties.run]
type = "string"
description = "Run only tests matching this regexp (passed to -run)."

[input.properties.verbose]
type = "boolean"
description = "Enable verbose output (-v). Defaults to false."

[input.properties.count]
type = "integer"
description = "Run tests this many times (passed to -count). Useful for detecting flaky tests."

[input.properties.race]
type = "boolean"
description = "Enable the race detector (-race). Defaults to false."

[input.properties.cover]
type = "boolean"
description = "Enable coverage analysis (-cover). Defaults to false."

[input.properties.coverprofile]
type = "string"
description = "Write a coverage profile to the named file (-coverprofile=<path>)."

[input.properties.timeout]
type = "string"
description = "Per-test timeout duration (-timeout=<duration>). Examples: '30s', '5m', '1h'."

[input.properties.short]
type = "boolean"
description = "Tell long-running tests to shorten their run time (-short). Defaults to false."

[input.properties.failfast]
type = "boolean"
description = "Stop on first test failure instead of running the full suite (-failfast). Defaults to false."

[input.properties.shuffle]
type = "string"
description = "Randomize test execution order (-shuffle=<seed|on>). Use 'on' for random seed or a number for reproducible order."

[input.properties.tags]
type = "string"
description = "Build tags (-tags), comma- or space-separated. Example: 'integration debug'. Surfaces test files behind `//go:build <tag>`."

[input.properties.cwd]
type = "string"
description = "Working directory to run go from. Use when go.mod lives in a subdirectory (e.g. 'go'). Defaults to the moxy process's CWD."

[annotations]
idempotent-hint = true
