schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Show documentation for a Go package or symbol. Default backend is 'go doc -all', plus a 'Sub-packages:' section listing any sub-packages of the queried package so the full module surface is discoverable in one call. Sub-packages are not listed when querying a specific symbol. Note: the default `go doc` backend does not honor build tags (upstream bug golang/go#76829) — set `markdown=true` to switch to gomarkdoc (which does), or read tag-gated source via hamster.mod-read."
command = "@BIN@/doc"
arg-order = ["package", "symbol", "markdown", "tags"]

[input]
type = "object"
required = ["package"]

[input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json', 'github.com/user/repo/pkg')"

[input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package overview. Ignored when markdown=true — gomarkdoc has no symbol filter and renders the full package; once #186 lands, pipe the markdown output through `pandoc.select selector=\"#<Symbol>\"` to extract one symbol's section."

[input.properties.markdown]
type = "boolean"
description = "Experimental: render via gomarkdoc instead of `go doc`. Output is GitHub-flavored markdown rather than plain text. Honors build tags via the `tags` parameter (the main reason to use this). Includes unexported symbols (gomarkdoc -u) since the markdown view is comprehensive by design. Note: `symbol` is not honored in this mode — use `pandoc.select` (#186) on the output to filter to one symbol once that lands. Defaults to false."

[input.properties.tags]
type = "string"
description = "Build tags to apply when markdown=true (forwarded as `gomarkdoc --tags`). Comma- or space-separated. Use to surface symbols behind `//go:build <tag>` (e.g. 'test'). Has no effect when markdown=false because `go doc` ignores tags upstream (golang/go#76829)."

[annotations]
read-only-hint = true
idempotent-hint = true
