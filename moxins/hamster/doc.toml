schema = 3
result-type = "text"
perms-request = "always-allow"
description = "Render Go package documentation as GitHub-flavored markdown via gomarkdoc. Includes unexported symbols (gomarkdoc -u). When `symbol` is set, returns just that symbol's anchor section via an internal pandoc round-trip. When `symbol` is omitted, returns the whole package and appends a `## Sub-packages` section listing direct children for one-shot module discovery."
command = "@BIN@/doc"
arg-order = ["package", "symbol", "tags"]

[input]
type = "object"
required = ["package"]

[input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json', 'github.com/user/repo/pkg', './internal/x')."

[input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package overview. Errors with a list of available anchors if the symbol isn't found. For methods, pass `Type.Method` (e.g. 'Handler.Handle')."

[input.properties.tags]
type = "string"
description = "Build tags forwarded to `gomarkdoc --tags`. Comma- or space-separated. Use to surface symbols behind `//go:build <tag>` (e.g. 'test', 'integration debug')."

[annotations]
read-only-hint = true
idempotent-hint = true
