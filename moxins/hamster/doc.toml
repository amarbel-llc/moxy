schema = 1
perms-request = "always-allow"
description = "Show documentation for a Go package or symbol. Returns the same output as 'go doc'."
command = "sh"
args = ["-c", """
set -euo pipefail
pkg="$1"

# Auto-detect local packages: rewrite module prefix to ./
mod=$(go list -m 2>/dev/null) || mod=""
if [ -n "$mod" ] && [ "$pkg" != "$mod" ]; then
  case "$pkg" in
    "$mod"/*) pkg="./${pkg#"$mod"/}" ;;
  esac
fi

if [ -n "${2:-}" ]; then
  go doc -all "$pkg.$2"
else
  go doc -all "$pkg"
fi
""", "_"]

[input]
type = "object"
required = ["package"]

[input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json', 'github.com/user/repo/pkg')"

[input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package overview."
