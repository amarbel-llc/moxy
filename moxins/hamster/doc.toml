schema = 1
perms-request = "always-allow"
description = "Show documentation for a Go package or symbol. Returns 'go doc -all' output, plus a 'Sub-packages:' section listing any sub-packages of the queried package so the full module surface is discoverable in one call. Sub-packages are not listed when querying a specific symbol."
command = "@BIN@/doc"
arg_order = ["package", "symbol"]

[input]
type = "object"
required = ["package"]

[input.properties.package]
type = "string"
description = "Go package path (e.g. 'fmt', 'encoding/json', 'github.com/user/repo/pkg')"

[input.properties.symbol]
type = "string"
description = "Exported symbol name (e.g. 'Println', 'Decoder'). Omit for package overview."

[annotations]
read-only-hint = true
idempotent-hint = true
