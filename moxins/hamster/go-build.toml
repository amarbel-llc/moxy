schema = 3
result-type = "text"
perms-request = "always-allow"
description = """Run a Go build. Equivalent to 'go build' with optional output \
path, build tags, ldflags, and race detector. Defaults to discarding the \
built binary (-o /dev/null) so the call doubles as a compile check; pass \
`output` explicitly to keep the artifact."""
command = "@BIN@/go-build"
arg-order = ["packages", "output", "tags", "ldflags", "race", "cwd"]

[input]

[input.properties.packages]
type = "string"
description = "Package pattern to build (default './...'). Examples: './cmd/moxy', 'github.com/x/y/cmd/foo'."

[input.properties.output]
type = "string"
description = "Write resulting binary to this path (-o). Defaults to /dev/null (compile-check; no binary kept). Pass an explicit path to keep the artifact."

[input.properties.tags]
type = "string"
description = "Build tags (-tags), comma- or space-separated. Example: 'integration debug'."

[input.properties.ldflags]
type = "string"
description = "Linker flags (-ldflags). Example: '-X main.version=1.2.3 -s -w'."

[input.properties.race]
type = "boolean"
description = "Enable the race detector (-race). Defaults to false."

[input.properties.cwd]
type = "string"
description = "Working directory to run go from. Use when go.mod lives in a subdirectory (e.g. 'go'). Defaults to the moxy process's CWD."

[annotations]
idempotent-hint = true
