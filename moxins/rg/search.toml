schema = 3
result-type = "text"
no-truncate = true
perms-request = "always-allow"
description = """Search file contents using ripgrep. Returns file paths by default \
(output_mode=files_with_matches). Use output_mode=content for matching lines with \
context, or output_mode=count for match counts per file."""
command = "@BIN@/search"
arg-order = [
  "pattern",
  "path",
  "glob",
  "type",
  "output_mode",
  "context",
  "case_insensitive",
  "multiline",
  "hidden",
]

[input]
type = "object"
required = ["pattern"]

[input.properties.pattern]
type = "string"
description = "The regular expression pattern to search for in file contents"

[input.properties.path]
type = "string"
description = "File or directory to search in. Defaults to current working directory."

[input.properties.glob]
type = "string"
description = "Glob pattern(s) to filter files — maps to rg --glob. Accepts a single glob (\"*.js\"), a brace glob (\"*.{ts,tsx}\"), or a comma-separated list of globs (\"*.sh,*.bash,*.bats\"); top-level commas split into multiple --glob args while brace expansion is preserved."

[input.properties.type]
type = "string"
description = "File type to search (e.g. \"js\", \"py\", \"go\"). More efficient than glob for standard file types."

[input.properties.output_mode]
type = "string"
description = "Output mode: \"files_with_matches\" (default) shows file paths, \"content\" shows matching lines with line numbers, \"count\" shows match counts per file."

[input.properties.context]
type = "integer"
description = "Number of context lines to show before and after each match (rg -C). Only useful with output_mode=content."

[input.properties.case_insensitive]
type = "boolean"
description = "Case insensitive search (rg -i)"

[input.properties.multiline]
type = "boolean"
description = "Enable multiline mode where . matches newlines and patterns can span lines (rg -U --multiline-dotall)."

[input.properties.hidden]
type = "boolean"
description = "Search hidden files and directories (e.g. .github/) that ripgrep skips by default (rg --hidden). .gitignore is still honored, so .git/ stays excluded."

[annotations]
read-only-hint = true
idempotent-hint = true
