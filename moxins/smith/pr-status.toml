schema = 3
result-type = "text"
perms-request = "always-allow"
description = "View the mergability and CI status of a Forgejo pull request"
command = "@BIN@/pr-status"
arg-order = ["number", "repo", "host"]

[input]
type = "object"
required = ["number"]

[input.properties.number]
type = "integer"
description = "Pull request number"

[input.properties.repo]
type = "string"
description = "Target repo in OWNER/NAME format. Omit to resolve from the cwd's git remotes."

[input.properties.host]
type = "string"
description = "Forgejo instance hostname (e.g. 'codeberg.org'). Omit to use the instance implied by the cwd's git remotes."

[annotations]
read-only-hint = true
open-world-hint = true
