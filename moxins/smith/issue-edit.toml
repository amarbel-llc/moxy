schema = 3
result-type = "text"
substitute-result-uris = false
description = "Edit a Forgejo issue's title and/or body. Only fields you pass are changed; at least one is required."
command = "@BIN@/issue-edit"
arg-order = ["number", "title", "body", "repo", "host"]
perms-request = "dynamic"

[input]
type = "object"
required = ["number"]

[input.properties.number]
type = "integer"
description = "Issue number"

[input.properties.title]
type = "string"
description = "New issue title. Omit to leave unchanged."

[input.properties.body]
type = "string"
description = "New issue body. Omit to leave unchanged."

[input.properties.repo]
type = "string"
description = "Target repo in OWNER/NAME format. Omit to resolve from the cwd's git remotes."

[input.properties.host]
type = "string"
description = "Forgejo instance hostname (e.g. 'codeberg.org'). Omit to use the instance implied by the cwd's git remotes."

[annotations]
open-world-hint = true

[dynamic-perms]
command = "@BIN@/repo-owner-perms"
arg-order = ["repo", "host"]
timeout-ms = 5000
