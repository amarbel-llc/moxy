schema = 3
result-type = "text"
perms-request = "always-allow"
description = """Get file content or directory listing from a Forgejo repository, via fj api's raw REST passthrough (repos/OWNER/NAME/contents/PATH). \
For files, returns decoded content. For directories, returns a JSON listing with name, type, size, and path for each entry. \
Unlike other smith tools, repo is REQUIRED — fj api has no cwd-remote auto-resolution."""
command = "@BIN@/content-get"
arg-order = ["repo", "path", "ref", "host"]

[input]
type = "object"
required = ["repo"]

[input.properties.repo]
type = "string"
description = "Source repo in OWNER/NAME format. Required — fj api has no cwd auto-resolution."

[input.properties.path]
type = "string"
description = "File or directory path within the repo (default: root)"

[input.properties.ref]
type = "string"
description = "Branch, tag, or commit SHA (default: repo's default branch)"

[input.properties.host]
type = "string"
description = "Forgejo instance hostname (e.g. 'codeberg.org'). Omit to use the instance implied by the cwd's git remotes."

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
