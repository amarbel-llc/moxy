schema = 3
result-type = "text"
perms-request = "always-allow"
description = "List a Forgejo repository's issue labels"
command = "@BIN@/repo-label-list"
arg-order = ["repo", "host", "archived"]

[input]
type = "object"

[input.properties.repo]
type = "string"
description = "Target repo in OWNER/NAME format. Omit to resolve from the cwd's git remotes."

[input.properties.host]
type = "string"
description = "Forgejo instance hostname (e.g. 'codeberg.org'). Omit to use the instance implied by the cwd's git remotes."

[input.properties.archived]
type = "boolean"
description = "Also show archived labels"

[annotations]
read-only-hint = true
idempotent-hint = true
open-world-hint = true
